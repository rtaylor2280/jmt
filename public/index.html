<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saber Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f0f10; --surface:#1a1a1e; --card:#222228;
    --border:#2e2e36; --text:#e8e8f0; --muted:#888899;
    --accent:#6c63ff; --accent2:#00c896; --warn:#e0a020;
    --danger:#e04040; --success:#30c870;
    --radius:8px; --radius-lg:12px;
  }
  body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; font-size:14px; line-height:1.5; }
  input,select,textarea {
    background:var(--surface); border:1px solid var(--border); color:var(--text);
    border-radius:var(--radius); padding:6px 10px; font-size:13px; width:100%;
    outline:none; transition:border-color .15s;
  }
  input:focus,select:focus,textarea:focus { border-color:var(--accent); }
  button {
    cursor:pointer; border-radius:var(--radius); padding:6px 14px; font-size:13px;
    border:1px solid var(--border); background:var(--card); color:var(--text);
    transition:background .15s; white-space:nowrap;
  }
  button:hover { background:var(--border); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.primary:hover { background:#574ed6; }
  button.danger  { background:var(--danger); border-color:var(--danger); color:#fff; }
  button.ghost   { background:none; border-color:transparent; color:var(--muted); }
  button.ghost:hover { color:var(--text); background:none; }
  button.sm { padding:3px 10px; font-size:12px; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); color:var(--muted); font-weight:500; white-space:nowrap; }
  td { padding:6px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:hover td { background:rgba(255,255,255,.02); }
  tfoot td { border-top:2px solid var(--border); border-bottom:none; padding-top:10px; font-weight:500; }
  .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:500; }
  .badge-hilt        { background:#2d2a4a; color:#a09af0; }
  .badge-parts       { background:#1e3030; color:#40c8a0; }
  .badge-electronics { background:#1e2a40; color:#60a0e0; }
  .badge-blade       { background:#3a2020; color:#e08060; }
  .badge-saber       { background:#2a2010; color:#d0a040; }
  .badge-ok  { background:#102010; color:var(--success); }
  .badge-low { background:#2a1a00; color:var(--warn); }
  .badge-out { background:#2a1010; color:var(--danger); }
  .stat { background:var(--card); border-radius:var(--radius); padding:14px 18px; }
  .stat-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
  .stat-value { font-size:22px; font-weight:600; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); display:flex; align-items:flex-start; justify-content:center; z-index:100; padding:24px 16px; overflow-y:auto; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px; width:900px; max-width:96vw; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .form-grid .full { grid-column:1/-1; }
  .form-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .tab-bar { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:20px; flex-wrap:wrap; }
  .tab { background:none; border:none; border-bottom:2px solid transparent; border-radius:0; padding:8px 16px; color:var(--muted); cursor:pointer; }
  .tab.active { color:var(--text); border-bottom-color:var(--accent); }
  h1 { font-size:18px; font-weight:600; }
  h2 { font-size:15px; font-weight:600; margin-bottom:12px; }
  h3 { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
  .header { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:1px solid var(--border); }
  .content { padding:24px; }
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:24px; }
  .overflow-x { overflow-x:auto; }
  .empty { text-align:center; color:var(--muted); padding:32px; font-size:13px; }
  .section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; margin-bottom:14px; }
  .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .kebab-wrap { position:relative; display:inline-block; }
  .kebab-btn { background:none; border:none; padding:2px 8px; font-size:18px; color:var(--muted); line-height:1; cursor:pointer; }
  .kebab-btn:hover { color:var(--text); background:none; }
  .kebab-menu { position:absolute; right:0; top:100%; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); min-width:120px; z-index:50; }
  .kebab-menu button { display:block; width:100%; text-align:left; background:none; border:none; border-radius:0; padding:8px 14px; font-size:13px; }
  .kebab-menu button:hover { background:var(--border); }
  .kebab-menu .danger-item { color:var(--danger); }
  .order-link { color:var(--accent); cursor:pointer; font-family:monospace; font-size:12px; }
  .order-link:hover { text-decoration:underline; }
  .result-ok  { background:#102010; border:1px solid var(--success); border-radius:var(--radius); padding:10px 14px; color:var(--success); margin-top:10px; font-size:13px; }
  .result-err { background:#2a1010; border:1px solid var(--danger); border-radius:var(--radius); padding:10px 14px; color:var(--danger); margin-top:10px; font-size:13px; }
  .alloc-match   { color:var(--success); font-weight:600; }
  .alloc-nomatch { color:var(--danger); font-weight:600; }
  .alloc-input { padding:3px 6px !important; font-size:12px !important; width:80px !important; }
  .toggle-link { font-size:12px; color:var(--accent); cursor:pointer; background:none; border:none; padding:0; }
  .toggle-link:hover { text-decoration:underline; background:none; }
  .filter-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; padding:10px 14px; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); }
  .filter-bar label { font-size:11px; color:var(--muted); margin-right:2px; }
  .filter-group { display:flex; align-items:center; gap:4px; }
  .view-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 24px; font-size:13px; }
  .view-grid .vk { font-size:11px; color:var(--muted); }
  .view-grid .vv { font-weight:500; }
  .spinner { display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .dirty-badge { background:var(--warn); color:#000; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const API = '';

const fmt$ = v => v==null?'—':'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const round2 = v => Math.round(Number(v)*100)/100;
const fmtDate = v => { if(!v)return'—'; const s=String(v); return s.includes('T')?s.split('T')[0]:s; };
const SOURCE_TYPES = ['Hilt','Parts','Electronics','Blade','Saber'];
const CONDITIONS   = ['New','Used','Refurbished','Damaged'];

const srcBadge = s => {
  const map={Hilt:'badge-hilt',Parts:'badge-parts',Electronics:'badge-electronics',Blade:'badge-blade',Saber:'badge-saber'};
  return <span className={`badge ${map[s]||'badge-parts'}`}>{s}</span>;
};

async function api(path,opts={}) {
  const r=await fetch(API+path,{headers:{'Content-Type':'application/json'},...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  if(r.status===204)return null;
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||r.statusText);
  return d;
}

function parseCSVText(text) {
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const ch of line){if(ch==='"'){inQ=!inQ;continue;}if(ch===','&&!inQ){vals.push(cur.trim());cur='';continue;}cur+=ch;}
    vals.push(cur.trim());
    return Object.fromEntries(headers.map((h,i)=>[h,vals[i]??'']));
  });
}

function distribute(items,shipTotal,taxTotal) {
  const ship=round2(Number(shipTotal)||0),tax=round2(Number(taxTotal)||0);
  const total=items.reduce((s,i)=>s+round2(Number(i.unit_cost||0)*Number(i.qty_purchased||1)),0);
  const rows=items.map(i=>{
    const w=total>0?round2(Number(i.unit_cost||0)*Number(i.qty_purchased||1))/total:1/items.length;
    return{...i,ship_alloc:round2(ship*w),tax_alloc:round2(tax*w)};
  });
  if(rows.length){
    const sd=round2(ship-rows.reduce((s,r)=>s+r.ship_alloc,0));
    const td=round2(tax-rows.reduce((s,r)=>s+r.tax_alloc,0));
    rows[rows.length-1].ship_alloc=round2(rows[rows.length-1].ship_alloc+sd);
    rows[rows.length-1].tax_alloc=round2(rows[rows.length-1].tax_alloc+td);
  }
  return rows;
}

// ── Modal ─────────────────────────────────
function Modal({title,onClose,width='900px',children}){
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h2 style={{margin:0}}>{title}</h2>
          <button onClick={onClose} className="ghost" style={{fontSize:20,lineHeight:1}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Kebab ─────────────────────────────────
function Kebab({items}){
  const [open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);
  },[]);
  return(
    <div className="kebab-wrap" ref={ref}>
      <button className="kebab-btn" onClick={()=>setOpen(o=>!o)}>⋮</button>
      {open&&<div className="kebab-menu">
        {items.map((item,i)=>(
          <button key={i} className={item.danger?'danger-item':''} onClick={()=>{setOpen(false);item.action();}}>{item.label}</button>
        ))}
      </div>}
    </div>
  );
}

// ── ItemForm — shared add/edit ────────────
function ItemForm({initial={},onSave,onClose,title}){
  const [f,setF]=useState({item_name:'',variant:'',category:'',source_type:'Electronics',qty_purchased:1,unit_cost:'',condition:'New',notes:'',...initial});
  const handle=e=>setF(p=>({...p,[e.target.name]:e.target.value}));
  return(
    <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:16,marginBottom:14}}>
      {title&&<div style={{fontSize:13,fontWeight:600,marginBottom:12,color:'var(--muted)'}}>{title}</div>}
      <form onSubmit={e=>{e.preventDefault();onSave(f);}}>
        <div className="form-grid">
          <div className="form-group full"><label>Item Name *</label><input name="item_name" value={f.item_name} onChange={handle} required/></div>
          <div className="form-group"><label>Source Type</label><select name="source_type" value={f.source_type} onChange={handle}>{SOURCE_TYPES.map(s=><option key={s}>{s}</option>)}</select></div>
          <div className="form-group"><label>Category</label><input name="category" value={f.category||''} onChange={handle}/></div>
          <div className="form-group"><label>Variant</label><input name="variant" value={f.variant||''} onChange={handle}/></div>
          <div className="form-group"><label>Condition</label><select name="condition" value={f.condition||'New'} onChange={handle}>{CONDITIONS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="form-group"><label>Qty</label><input type="number" name="qty_purchased" value={f.qty_purchased} onChange={handle} min="1"/></div>
          <div className="form-group"><label>Unit Cost</label><input type="number" name="unit_cost" value={f.unit_cost} onChange={handle} step="0.01" min="0"/></div>
          <div className="form-group full"><label>Notes</label><input name="notes" value={f.notes||''} onChange={handle}/></div>
        </div>
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <button type="submit" className="primary sm">Save Item</button>
          <button type="button" className="sm" onClick={onClose}>Cancel</button>
        </div>
      </form>
    </div>
  );
}

// ── Order Header Form ─────────────────────
function OrderHeaderForm({initial={},onSave,onClose,title='Edit Order Header'}){
  const [f,setF]=useState({order_number:'',vendor:'',order_date:'',shipping_total:'',tax_total:'',notes:'',...initial});
  const [saving,setSaving]=useState(false);
  const handle=e=>setF(p=>({...p,[e.target.name]:e.target.value}));
  const save=async e=>{
    e.preventDefault();setSaving(true);
    await onSave(f);
    setSaving(false);
  };
  return(
    <Modal title={title} onClose={onClose} width="560px">
      <form onSubmit={save}>
        <div className="form-grid">
          <div className="form-group"><label>Order # *</label><input name="order_number" value={f.order_number} onChange={handle} required/></div>
          <div className="form-group"><label>Vendor</label><input name="vendor" value={f.vendor||''} onChange={handle}/></div>
          <div className="form-group"><label>Order Date</label><input type="date" name="order_date" value={f.order_date?fmtDate(f.order_date):''} onChange={handle}/></div>
          <div className="form-group"><label>Shipping Total</label><input type="number" name="shipping_total" value={f.shipping_total||''} onChange={handle} step="0.01" min="0"/></div>
          <div className="form-group"><label>Tax Total</label><input type="number" name="tax_total" value={f.tax_total||''} onChange={handle} step="0.01" min="0"/></div>
          <div className="form-group full"><label>Notes</label><input name="notes" value={f.notes||''} onChange={handle}/></div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
          <button type="button" onClick={onClose}>Cancel</button>
          <button type="submit" className="primary" disabled={saving}>{saving?'Saving…':'Save Order'}</button>
        </div>
      </form>
    </Modal>
  );
}

// ── LineItemsTable ────────────────────────
function LineItemsTable({rows,shipTarget,taxTarget,onAllocChange,onDelete,onEdit,onSaveAlloc,onRedistribute,saving}){
  const shipSum=round2(rows.reduce((s,r)=>s+Number(r.ship_alloc||0),0));
  const taxSum =round2(rows.reduce((s,r)=>s+Number(r.tax_alloc||0),0));
  const hasAlloc=(shipTarget>0||taxTarget>0);
  const balanced=(!hasAlloc)||(shipSum===shipTarget&&taxSum===taxTarget);
  return(
    <div>
      <div className="overflow-x">
        <table>
          <thead><tr>
            {rows[0]?.item_id&&<th>ID</th>}
            <th>Name</th><th>Type</th><th>Qty</th><th>Unit Cost</th>
            {hasAlloc&&<><th>Ship Alloc</th><th>Tax Alloc</th></>}
            <th>Line Total</th><th></th>
          </tr></thead>
          <tbody>
            {rows.map((r,i)=>{
              const lt=round2(Number(r.unit_cost||0)*Number(r.qty_purchased||1)+Number(r.ship_alloc||0)+Number(r.tax_alloc||0));
              return(
                <tr key={r.item_id||r._key||i}>
                  {r.item_id&&<td style={{fontFamily:'monospace',fontSize:11}}>{r.item_id}</td>}
                  <td><div style={{fontWeight:500}}>{r.item_name}</div>{r.variant&&<div style={{fontSize:11,color:'var(--muted)'}}>{r.variant}</div>}</td>
                  <td>{srcBadge(r.source_type)}</td>
                  <td>{r.qty_purchased}</td>
                  <td>{fmt$(r.unit_cost)}</td>
                  {hasAlloc&&<>
                    <td><input className="alloc-input" type="number" value={r.ship_alloc??0} step="0.01" onChange={e=>onAllocChange(i,'ship_alloc',round2(parseFloat(e.target.value)||0))}/></td>
                    <td><input className="alloc-input" type="number" value={r.tax_alloc??0} step="0.01" onChange={e=>onAllocChange(i,'tax_alloc',round2(parseFloat(e.target.value)||0))}/></td>
                  </>}
                  <td style={{fontWeight:500}}>{fmt$(lt)}</td>
                  <td><Kebab items={[
                    ...(onEdit?[{label:'Edit',action:()=>onEdit(r,i)}]:[]),
                    ...(onDelete?[{label:'Delete',danger:true,action:()=>onDelete(r)}]:[]),
                  ]}/></td>
                </tr>
              );
            })}
          </tbody>
          {hasAlloc&&rows.length>0&&(
            <tfoot><tr>
              {rows[0]?.item_id&&<td/>}
              <td colSpan={4} style={{color:'var(--muted)',fontSize:12}}>Totals</td>
              <td><span className={shipSum===shipTarget?'alloc-match':'alloc-nomatch'}>{fmt$(shipSum)}<span style={{color:'var(--muted)',fontWeight:400}}> / {fmt$(shipTarget)}</span></span></td>
              <td><span className={taxSum===taxTarget?'alloc-match':'alloc-nomatch'}>{fmt$(taxSum)}<span style={{color:'var(--muted)',fontWeight:400}}> / {fmt$(taxTarget)}</span></span></td>
              <td/><td/>
            </tr></tfoot>
          )}
        </table>
      </div>
      {hasAlloc&&(
        <div style={{display:'flex',gap:8,alignItems:'center',marginTop:10,justifyContent:'flex-end'}}>
          <button className="sm" onClick={onRedistribute}>Redistribute</button>
          {onSaveAlloc&&<button className="primary sm" onClick={onSaveAlloc} disabled={!balanced||saving}>{saving?'Saving…':'Save Allocation'}</button>}
          <span className={balanced?'alloc-match':'alloc-nomatch'} style={{fontSize:12}}>{balanced?'✓ Balanced':'✗ Unbalanced'}</span>
        </div>
      )}
    </div>
  );
}

// ── New Order Modal ───────────────────────
function NewOrderModal({onClose,onSaved}){
  const [pasteHeader,setPasteHeader]=useState(false);
  const [pasteText,setPasteText]=useState('');
  const [header,setHeader]=useState({order_number:'',vendor:'',order_date:'',shipping_total:'',tax_total:'',notes:''});
  const [rows,setRows]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [pasteItems,setPasteItems]=useState(false);
  const [pasteItemText,setPasteItemText]=useState('');
  const [preview,setPreview]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');

  const shipTarget=round2(Number(header.shipping_total)||0);
  const taxTarget =round2(Number(header.tax_total)||0);
  const hasAlloc=shipTarget>0||taxTarget>0;
  const shipSum=round2(rows.reduce((s,r)=>s+Number(r.ship_alloc||0),0));
  const taxSum =round2(rows.reduce((s,r)=>s+Number(r.tax_alloc||0),0));
  const balanced=(!hasAlloc)||(shipSum===shipTarget&&taxSum===taxTarget);
  const canSave=header.order_number&&rows.length>0&&balanced;

  const handleHeader=e=>setHeader(p=>({...p,[e.target.name]:e.target.value}));
  const handleShipTax=e=>{const upd={...header,[e.target.name]:e.target.value};setHeader(upd);setRows(r=>distribute(r,upd.shipping_total,upd.tax_total));};

  const parseHeaderPaste=()=>{
    const r=parseCSVText(pasteText)[0];if(!r)return;
    const upd={...header,order_number:r.order_number||header.order_number,vendor:r.vendor||header.vendor,order_date:r.order_date||header.order_date,shipping_total:r.shipping_total||header.shipping_total,tax_total:r.tax_total||header.tax_total};
    setHeader(upd);setRows(rv=>distribute(rv,upd.shipping_total,upd.tax_total));
    setPasteHeader(false);setPasteText('');
  };

  const addItem=f=>{
    const item={...f,qty_purchased:parseInt(f.qty_purchased)||1,unit_cost:parseFloat(f.unit_cost)||0,ship_alloc:0,tax_alloc:0,_key:Date.now()};
    setRows(distribute([...rows,item],header.shipping_total,header.tax_total));
    setShowAdd(false);
  };

  const editItem=(f,idx)=>{
    const updated=rows.map((r,i)=>i===idx?{...r,...f,qty_purchased:parseInt(f.qty_purchased)||1,unit_cost:parseFloat(f.unit_cost)||0}:r);
    setRows(distribute(updated,header.shipping_total,header.tax_total));
    setEditIdx(null);
  };

  const removeItem=row=>setRows(distribute(rows.filter(x=>(x._key||x.item_id)!==(row._key||row.item_id)),header.shipping_total,header.tax_total));

  const parsePasteItems=()=>{
    const valid=['Hilt','Parts','Electronics','Blade','Saber'];
    setPreview(parseCSVText(pasteItemText).map((r,i)=>({item_name:r.item_name||'?',variant:r.variant||'',category:r.category||'',source_type:valid.includes(r.source_type)?r.source_type:'Parts',qty_purchased:parseInt(r.qty_purchased)||1,unit_cost:parseFloat(r.unit_cost)||0,condition:r.condition||'New',notes:r.notes||'',ship_alloc:0,tax_alloc:0,_key:Date.now()+i})));
  };

  const confirmPaste=()=>{
    setRows(distribute([...rows,...preview],header.shipping_total,header.tax_total));
    setPreview(null);setPasteItemText('');setPasteItems(false);
  };

  const allocChange=(i,field,val)=>setRows(r=>r.map((x,j)=>j===i?{...x,[field]:val}:x));

  const save=async()=>{
    if(!canSave)return;
    setSaving(true);setErr('');
    try{
      await api('/api/orders',{method:'POST',body:{order_number:header.order_number,vendor:header.vendor||null,order_date:header.order_date||null,shipping_total:shipTarget,tax_total:taxTarget,notes:header.notes||null}});
      for(const row of rows) await api('/api/purchased-items',{method:'POST',body:{order_number:header.order_number,item_name:row.item_name,variant:row.variant||null,category:row.category||null,vendor:header.vendor||null,date_purchased:header.order_date||null,qty_purchased:row.qty_purchased,unit_cost:row.unit_cost,condition:row.condition||'New',source_type:row.source_type,notes:row.notes||null,shipping_allocated:row.ship_alloc||0,tax_allocated:row.tax_alloc||0}});
      onSaved();
    }catch(e){setErr(e.message);}
    setSaving(false);
  };

  return(
    <Modal title="New Order" onClose={onClose} width="860px">
      <div className="section">
        <div className="section-header">
          <h3>Order Header</h3>
          <button className="toggle-link" onClick={()=>setPasteHeader(p=>!p)}>{pasteHeader?'Enter manually':'Paste instead'}</button>
        </div>
        {pasteHeader?(
          <div>
            <p style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>Paste order footer CSV:<br/><code style={{fontSize:11}}>order_number,vendor,order_date,shipping_total,tax_total</code></p>
            <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={3} style={{fontFamily:'monospace',fontSize:12,marginBottom:8}}/>
            <div style={{display:'flex',gap:8}}>
              <button className="primary sm" onClick={parseHeaderPaste} disabled={!pasteText.trim()}>Parse & Fill</button>
              <button className="sm" onClick={()=>{setPasteHeader(false);setPasteText('');}}>Cancel</button>
            </div>
          </div>
        ):(
          <div className="form-grid">
            <div className="form-group"><label>Order # *</label><input name="order_number" value={header.order_number} onChange={handleHeader}/></div>
            <div className="form-group"><label>Vendor</label><input name="vendor" value={header.vendor} onChange={handleHeader}/></div>
            <div className="form-group"><label>Order Date</label><input type="date" name="order_date" value={header.order_date} onChange={handleHeader}/></div>
            <div className="form-group"><label>Shipping Total</label><input type="number" name="shipping_total" value={header.shipping_total} onChange={handleShipTax} step="0.01" min="0"/></div>
            <div className="form-group"><label>Tax Total</label><input type="number" name="tax_total" value={header.tax_total} onChange={handleShipTax} step="0.01" min="0"/></div>
            <div className="form-group full"><label>Notes</label><input name="notes" value={header.notes} onChange={handleHeader}/></div>
          </div>
        )}
      </div>

      <div className="section">
        <div className="section-header">
          <h3>Line Items ({rows.length})</h3>
          <div style={{display:'flex',gap:8}}>
            {hasAlloc&&rows.length>0&&<button className="sm" onClick={()=>setRows(distribute(rows,header.shipping_total,header.tax_total))}>Redistribute</button>}
            <button className="sm" onClick={()=>{setShowAdd(a=>!a);setPasteItems(false);setEditIdx(null);}}>+ Add Item</button>
            <button className="sm" onClick={()=>{setPasteItems(p=>!p);setShowAdd(false);setPreview(null);setEditIdx(null);}}>Paste Items</button>
          </div>
        </div>

        {showAdd&&<ItemForm title="New Item" onSave={addItem} onClose={()=>setShowAdd(false)}/>}
        {editIdx!==null&&<ItemForm title={`Editing row ${editIdx+1}`} initial={rows[editIdx]} onSave={f=>editItem(f,editIdx)} onClose={()=>setEditIdx(null)}/>}

        {pasteItems&&!preview&&(
          <div style={{background:'var(--card)',borderRadius:'var(--radius)',padding:14,marginBottom:14}}>
            <textarea value={pasteItemText} onChange={e=>setPasteItemText(e.target.value)} rows={7} style={{fontFamily:'monospace',fontSize:12,marginBottom:8}} placeholder="item_name,variant,category,vendor,order_number,date_purchased,qty_purchased,unit_cost,source_type,condition,notes"/>
            <div style={{display:'flex',gap:8}}>
              <button className="primary sm" onClick={parsePasteItems} disabled={!pasteItemText.trim()}>Preview</button>
              <button className="sm" onClick={()=>{setPasteItems(false);setPasteItemText('');}}>Cancel</button>
            </div>
          </div>
        )}

        {preview&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:8}}>{preview.length} items — confirm to add:</div>
            <div className="overflow-x" style={{marginBottom:10}}>
              <table><thead><tr><th>Name</th><th>Type</th><th>Qty</th><th>Unit Cost</th><th>Variant</th></tr></thead>
                <tbody>{preview.map((r,i)=><tr key={i}><td>{r.item_name}</td><td>{srcBadge(r.source_type)}</td><td>{r.qty_purchased}</td><td>{fmt$(r.unit_cost)}</td><td style={{fontSize:12,color:'var(--muted)'}}>{r.variant||'—'}</td></tr>)}</tbody>
              </table>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="primary sm" onClick={confirmPaste}>Confirm & Distribute</button>
              <button className="sm" onClick={()=>{setPreview(null);setPasteItemText('');}}>Back</button>
            </div>
          </div>
        )}

        {rows.length===0?<div className="empty" style={{padding:20}}>No items yet.</div>
          :<LineItemsTable rows={rows} shipTarget={shipTarget} taxTarget={taxTarget}
            onAllocChange={allocChange} onDelete={removeItem}
            onEdit={(_,idx)=>{setEditIdx(idx);setShowAdd(false);setPasteItems(false);}}
            onRedistribute={()=>setRows(distribute(rows,header.shipping_total,header.tax_total))}/>
        }
      </div>

      {err&&<div className="result-err" style={{marginBottom:12}}>{err}</div>}
      {!balanced&&hasAlloc&&<div style={{background:'#2a1a00',border:'1px solid var(--warn)',borderRadius:'var(--radius)',padding:'8px 14px',color:'var(--warn)',fontSize:12,marginBottom:12}}>Allocations must balance before saving.</div>}
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button onClick={onClose}>Cancel</button>
        <button className="primary" onClick={save} disabled={!canSave||saving}>{saving?'Saving…':`Save Order (${rows.length} item${rows.length!==1?'s':''})`}</button>
      </div>
    </Modal>
  );
}

// ── Order Detail Modal ────────────────────
function OrderDetailModal({order:initOrder,onClose,onReload}){
  const [order,setOrder]=useState(initOrder);
  const [dbItems,setDbItems]=useState([]);
  const [stagedRows,setStagedRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [dirty,setDirty]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [editItemIdx,setEditItemIdx]=useState(null);
  const [pasteItems,setPasteItems]=useState(false);
  const [pasteText,setPasteText]=useState('');
  const [preview,setPreview]=useState(null);
  const [saving,setSaving]=useState(false);
  const [showEditHeader,setShowEditHeader]=useState(false);

  const shipTarget=round2(Number(order.shipping_total)||0);
  const taxTarget =round2(Number(order.tax_total)||0);
  const hasAlloc=shipTarget>0||taxTarget>0;
  const shipSum=round2(stagedRows.reduce((s,r)=>s+Number(r.ship_alloc||0),0));
  const taxSum =round2(stagedRows.reduce((s,r)=>s+Number(r.tax_alloc||0),0));
  const balanced=(!hasAlloc)||(shipSum===shipTarget&&taxSum===taxTarget);

  const loadItems=async()=>{
    setLoading(true);
    const rows=await api(`/api/orders?order_number=${encodeURIComponent(order.order_number)}`);
    setDbItems(rows);
    setStagedRows(distribute(rows.map(r=>({...r,ship_alloc:Number(r.shipping_allocated||0),tax_alloc:Number(r.tax_allocated||0)})),order.shipping_total,order.tax_total));
    setDirty(false);
    setLoading(false);
  };
  useEffect(()=>{loadItems();},[order.order_number]);

  const markDirty=newRows=>{setStagedRows(newRows);setDirty(true);};

  const addItem=async f=>{
    await api('/api/purchased-items',{method:'POST',body:{...f,order_number:order.order_number,vendor:order.vendor,date_purchased:order.order_date}});
    await loadItems();
  };

  const editItemLocal=(f,idx)=>{
    const updated=stagedRows.map((r,i)=>i===idx?{...r,...f,qty_purchased:parseInt(f.qty_purchased)||1,unit_cost:parseFloat(f.unit_cost)||0}:r);
    markDirty(distribute(updated,order.shipping_total,order.tax_total));
    setEditItemIdx(null);
  };

  const delItem=async item=>{
    if(!confirm(`Delete ${item.item_id}?`))return;
    await api(`/api/purchased-items/${item.item_id}`,{method:'DELETE'});
    await loadItems();
  };

  const parsePaste=()=>{
    const valid=['Hilt','Parts','Electronics','Blade','Saber'];
    setPreview(parseCSVText(pasteText).map(r=>({item_name:r.item_name||'?',variant:r.variant||'',category:r.category||'',source_type:valid.includes(r.source_type)?r.source_type:'Parts',qty_purchased:parseInt(r.qty_purchased)||1,unit_cost:parseFloat(r.unit_cost)||0,condition:r.condition||'New',notes:r.notes||''})));
  };

  const confirmPaste=async()=>{
    setSaving(true);
    for(const row of preview) await api('/api/purchased-items',{method:'POST',body:{...row,order_number:order.order_number,vendor:order.vendor,date_purchased:order.order_date}});
    setPreview(null);setPasteText('');setPasteItems(false);
    await loadItems();setSaving(false);
  };

  const allocChange=(i,field,val)=>markDirty(stagedRows.map((x,j)=>j===i?{...x,[field]:val}:x));

  // Save all staged changes (item edits + allocation)
  const saveAll=async()=>{
    if(!balanced)return;
    setSaving(true);
    for(const r of stagedRows){
      const orig=dbItems.find(x=>x.item_id===r.item_id);
      const allocChanged=orig&&(Number(orig.shipping_allocated||0)!==r.ship_alloc||Number(orig.tax_allocated||0)!==r.tax_alloc);
      const fieldsChanged=orig&&(orig.item_name!==r.item_name||orig.unit_cost!==r.unit_cost||orig.qty_purchased!==r.qty_purchased||orig.source_type!==r.source_type);
      if(fieldsChanged){
        await api(`/api/purchased-items/${r.item_id}`,{method:'PUT',body:{item_name:r.item_name,variant:r.variant||null,category:r.category||null,vendor:r.vendor||null,date_purchased:r.date_purchased||null,qty_purchased:r.qty_purchased,qty_remaining:r.qty_purchased,unit_cost:r.unit_cost,condition:r.condition||'New',source_type:r.source_type,location:r.location||null,notes:r.notes||null}});
      } else if(allocChanged){
        await api(`/api/purchased-items/${r.item_id}`,{method:'PUT',body:{_partial:true,shipping_allocated:r.ship_alloc||0,tax_allocated:r.tax_alloc||0}});
      }
    }
    await loadItems();setSaving(false);
  };

  const saveHeader=async f=>{
    await api('/api/orders',{method:'POST',body:{order_number:f.order_number,vendor:f.vendor||null,order_date:f.order_date||null,shipping_total:parseFloat(f.shipping_total)||0,tax_total:parseFloat(f.tax_total)||0,notes:f.notes||null}});
    const updated={...order,...f,shipping_total:parseFloat(f.shipping_total)||0,tax_total:parseFloat(f.tax_total)||0};
    setOrder(updated);
    setStagedRows(distribute(stagedRows,f.shipping_total,f.tax_total));
    setShowEditHeader(false);
    if(onReload)onReload();
  };

  const subtotal=stagedRows.reduce((s,r)=>s+round2(Number(r.unit_cost||0)*Number(r.qty_purchased||1)+Number(r.ship_alloc||0)+Number(r.tax_alloc||0)),0);

  return(
    <Modal title={`Order ${order.order_number}`} onClose={onClose}>
      {/* Summary bar */}
      <div style={{display:'flex',gap:16,fontSize:13,marginBottom:14,flexWrap:'wrap',padding:'10px 14px',background:'var(--surface)',borderRadius:'var(--radius)',alignItems:'center'}}>
        <span><span style={{color:'var(--muted)'}}>Vendor:</span> <strong>{order.vendor||'—'}</strong></span>
        <span><span style={{color:'var(--muted)'}}>Date:</span> <strong>{fmtDate(order.order_date)}</strong></span>
        <span><span style={{color:'var(--muted)'}}>Shipping:</span> <strong>{fmt$(order.shipping_total)}</strong></span>
        <span><span style={{color:'var(--muted)'}}>Tax:</span> <strong>{fmt$(order.tax_total)}</strong></span>
        <span><span style={{color:'var(--muted)'}}>Total:</span> <strong style={{color:'var(--accent2)'}}>{fmt$(subtotal)}</strong></span>
        <button className="sm" style={{marginLeft:'auto'}} onClick={()=>setShowEditHeader(true)}>Edit Header</button>
      </div>

      {showEditHeader&&(
        <OrderHeaderForm
          title={`Edit Order ${order.order_number}`}
          initial={order}
          onSave={saveHeader}
          onClose={()=>setShowEditHeader(false)}
        />
      )}

      <div className="section">
        <div className="section-header">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <h3 style={{margin:0}}>Line Items ({dbItems.length})</h3>
            {dirty&&<span className="dirty-badge">Unsaved changes</span>}
          </div>
          <div style={{display:'flex',gap:8}}>
            {dirty&&<button className="primary sm" onClick={saveAll} disabled={!balanced||saving}>{saving?'Saving…':'Save Changes'}</button>}
            {hasAlloc&&stagedRows.length>0&&<button className="sm" onClick={()=>setStagedRows(distribute(stagedRows,order.shipping_total,order.tax_total))}>Redistribute</button>}
            <button className="sm" onClick={()=>{setShowAdd(a=>!a);setPasteItems(false);setEditItemIdx(null);}}>+ Add Item</button>
            <button className="sm" onClick={()=>{setPasteItems(p=>!p);setShowAdd(false);setPreview(null);setEditItemIdx(null);}}>Paste Items</button>
          </div>
        </div>

        {showAdd&&<ItemForm title="New Item" onSave={async f=>{await addItem(f);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
        {editItemIdx!==null&&<ItemForm title={`Editing: ${stagedRows[editItemIdx]?.item_name}`} initial={stagedRows[editItemIdx]} onSave={f=>editItemLocal(f,editItemIdx)} onClose={()=>setEditItemIdx(null)}/>}

        {pasteItems&&!preview&&(
          <div style={{background:'var(--card)',borderRadius:'var(--radius)',padding:14,marginBottom:14}}>
            <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={6} style={{fontFamily:'monospace',fontSize:12,marginBottom:8}} placeholder="item_name,variant,category,..."/>
            <div style={{display:'flex',gap:8}}>
              <button className="primary sm" onClick={parsePaste} disabled={!pasteText.trim()}>Preview</button>
              <button className="sm" onClick={()=>{setPasteItems(false);setPasteText('');}}>Cancel</button>
            </div>
          </div>
        )}

        {preview&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:8}}>{preview.length} items parsed:</div>
            <div className="overflow-x" style={{marginBottom:10}}>
              <table><thead><tr><th>Name</th><th>Type</th><th>Qty</th><th>Unit Cost</th><th>Variant</th></tr></thead>
                <tbody>{preview.map((r,i)=><tr key={i}><td>{r.item_name}</td><td>{srcBadge(r.source_type)}</td><td>{r.qty_purchased}</td><td>{fmt$(r.unit_cost)}</td><td style={{fontSize:12,color:'var(--muted)'}}>{r.variant||'—'}</td></tr>)}</tbody>
              </table>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="primary sm" onClick={confirmPaste} disabled={saving}>{saving?'Saving…':'Confirm'}</button>
              <button className="sm" onClick={()=>{setPreview(null);setPasteText('');}}>Back</button>
            </div>
          </div>
        )}

        {loading
          ? <div style={{display:'flex',alignItems:'center',gap:10,padding:24,color:'var(--muted)',fontSize:13}}><div className="spinner"/><span>Loading items…</span></div>
          : stagedRows.length===0
            ? <div className="empty">No items on this order.</div>
            : <LineItemsTable
                rows={stagedRows} shipTarget={shipTarget} taxTarget={taxTarget}
                onAllocChange={allocChange}
                onDelete={delItem}
                onEdit={(_,idx)=>{setEditItemIdx(idx);setShowAdd(false);setPasteItems(false);}}
                onSaveAlloc={hasAlloc&&dirty?saveAll:undefined}
                onRedistribute={()=>setStagedRows(distribute(stagedRows,order.shipping_total,order.tax_total))}
                saving={saving}
              />
        }
      </div>
    </Modal>
  );
}

// ── Orders Tab ────────────────────────────
function OrdersTab({onOpenOrderModal}){
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(true);
  const [detail,setDetail]=useState(null);
  const [editOrder,setEditOrder]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [search,setSearch]=useState('');
  const [filterVendor,setFilterVendor]=useState('');
  const [filterDateFrom,setFilterDateFrom]=useState('');
  const [filterDateTo,setFilterDateTo]=useState('');

  const load=async()=>{setLoading(true);setOrders(await api('/api/orders'));setLoading(false);};
  useEffect(()=>{load();},[]);

  const vendors=useMemo(()=>[...new Set(orders.map(o=>o.vendor).filter(Boolean))].sort(),[orders]);

  const filtered=useMemo(()=>orders.filter(o=>{
    if(search&&!o.order_number.toLowerCase().includes(search.toLowerCase())&&!(o.vendor||'').toLowerCase().includes(search.toLowerCase()))return false;
    if(filterVendor&&o.vendor!==filterVendor)return false;
    if(filterDateFrom&&fmtDate(o.order_date)<filterDateFrom)return false;
    if(filterDateTo&&fmtDate(o.order_date)>filterDateTo)return false;
    return true;
  }),[orders,search,filterVendor,filterDateFrom,filterDateTo]);

  const del=async o=>{
    if(!confirm(`Delete order ${o.order_number}?`))return;
    await api(`/api/orders?order_number=${encodeURIComponent(o.order_number)}`,{method:'DELETE'});load();
  };

  const saveEditHeader=async f=>{
    await api('/api/orders',{method:'POST',body:{order_number:f.order_number,vendor:f.vendor||null,order_date:f.order_date||null,shipping_total:parseFloat(f.shipping_total)||0,tax_total:parseFloat(f.tax_total)||0,notes:f.notes||null}});
    setEditOrder(null);load();
  };

  const totalSpend=orders.reduce((s,o)=>s+Number(o.order_total||0),0);
  const totalShip =orders.reduce((s,o)=>s+Number(o.shipping_total||0),0);
  const totalTax  =orders.reduce((s,o)=>s+Number(o.tax_total||0),0);

  return(
    <>
      <div className="stats-row">
        <div className="stat"><div className="stat-label">Orders</div><div className="stat-value">{orders.length}</div></div>
        <div className="stat"><div className="stat-label">Tax</div><div className="stat-value">{fmt$(totalTax)}</div></div>
        <div className="stat"><div className="stat-label">Shipping</div><div className="stat-value">{fmt$(totalShip)}</div></div>
        <div className="stat"><div className="stat-label">Total Spend</div><div className="stat-value">{fmt$(totalSpend)}</div></div>
      </div>

      <div className="filter-bar">
        <div className="filter-group"><label>Search</label><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Order # or vendor" style={{width:160}}/></div>
        <div className="filter-group"><label>Vendor</label>
          <select value={filterVendor} onChange={e=>setFilterVendor(e.target.value)} style={{width:140}}>
            <option value="">All</option>{vendors.map(v=><option key={v}>{v}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>From</label><input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)} style={{width:140}}/></div>
        <div className="filter-group"><label>To</label><input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)} style={{width:140}}/></div>
        {(search||filterVendor||filterDateFrom||filterDateTo)&&<button className="sm ghost" onClick={()=>{setSearch('');setFilterVendor('');setFilterDateFrom('');setFilterDateTo('');}}>Clear</button>}
        <button className="primary" style={{marginLeft:'auto'}} onClick={()=>setShowNew(true)}>+ New Order</button>
      </div>

      <div className="overflow-x">
        {loading?<div className="empty">Loading…</div>:filtered.length===0?<div className="empty">No orders match filters.</div>:(
          <table>
            <thead><tr><th>Order #</th><th>Vendor</th><th>Date</th><th>Items</th><th>Parts</th><th>Shipping</th><th>Tax</th><th>Total</th><th></th></tr></thead>
            <tbody>
              {filtered.map(o=>(
                <tr key={o.id}>
                  <td><span className="order-link" onClick={()=>setDetail(o)}>{o.order_number}</span></td>
                  <td>{o.vendor||'—'}</td>
                  <td style={{fontSize:12}}>{fmtDate(o.order_date)}</td>
                  <td style={{textAlign:'center'}}>{o.item_count}</td>
                  <td>{fmt$(o.parts_total)}</td>
                  <td>{fmt$(o.shipping_total)}</td>
                  <td>{fmt$(o.tax_total)}</td>
                  <td style={{fontWeight:500}}>{fmt$(o.order_total)}</td>
                  <td><Kebab items={[
                    {label:'View',action:()=>setDetail(o)},
                    {label:'Edit',action:()=>setEditOrder(o)},
                    {label:'Delete',danger:true,action:()=>del(o)}
                  ]}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {showNew&&<NewOrderModal onClose={()=>setShowNew(false)} onSaved={()=>{setShowNew(false);load();}}/>}
      {detail&&<OrderDetailModal order={detail} onClose={()=>{setDetail(null);load();}} onReload={load}/>}
      {editOrder&&<OrderHeaderForm title={`Edit Order ${editOrder.order_number}`} initial={editOrder} onSave={saveEditHeader} onClose={()=>setEditOrder(null)}/>}
    </>
  );
}

// ── Purchased Items Tab ───────────────────
function PurchasedItemsTab({onOpenOrder}){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [filterSrc,setFilterSrc]=useState('');
  const [filterVendor,setFilterVendor]=useState('');
  const [filterCondition,setFilterCondition]=useState('');
  const [filterDateFrom,setFilterDateFrom]=useState('');
  const [filterDateTo,setFilterDateTo]=useState('');
  const [viewItem,setViewItem]=useState(null);
  const [editItem,setEditItem]=useState(null);

  const load=useCallback(async()=>{setLoading(true);setItems(await api('/api/purchased-items'));setLoading(false);},[]);
  useEffect(()=>{load();},[load]);

  const vendors   =useMemo(()=>[...new Set(items.map(i=>i.vendor).filter(Boolean))].sort(),[items]);
  const srcTypes  =useMemo(()=>[...new Set(items.map(i=>i.source_type).filter(Boolean))].sort(),[items]);
  const conditions=useMemo(()=>[...new Set(items.map(i=>i.condition).filter(Boolean))].sort(),[items]);

  const filtered=useMemo(()=>items.filter(i=>{
    if(search&&!i.item_name.toLowerCase().includes(search.toLowerCase())&&!i.item_id.toLowerCase().includes(search.toLowerCase())&&!(i.vendor||'').toLowerCase().includes(search.toLowerCase()))return false;
    if(filterSrc&&i.source_type!==filterSrc)return false;
    if(filterVendor&&i.vendor!==filterVendor)return false;
    if(filterCondition&&i.condition!==filterCondition)return false;
    if(filterDateFrom&&fmtDate(i.date_purchased)<filterDateFrom)return false;
    if(filterDateTo&&fmtDate(i.date_purchased)>filterDateTo)return false;
    return true;
  }),[items,search,filterSrc,filterVendor,filterCondition,filterDateFrom,filterDateTo]);

  const saveEdit=async f=>{await api(`/api/purchased-items/${editItem.item_id}`,{method:'PUT',body:f});setEditItem(null);setViewItem(null);load();};
  const del=async item=>{if(!confirm(`Delete ${item.item_id}?`))return;await api(`/api/purchased-items/${item.item_id}`,{method:'DELETE'});setViewItem(null);load();};

  const totalCost=filtered.reduce((s,i)=>s+Number(i.total_line_cost||0),0);
  const totalShip=filtered.reduce((s,i)=>s+Number(i.shipping_allocated||0),0);
  const totalTax =filtered.reduce((s,i)=>s+Number(i.tax_allocated||0),0);
  const hasFilters=search||filterSrc||filterVendor||filterCondition||filterDateFrom||filterDateTo;

  return(
    <>
      <div className="stats-row">
        <div className="stat"><div className="stat-label">Line Items</div><div className="stat-value">{filtered.length}{hasFilters&&items.length!==filtered.length&&<span style={{fontSize:13,color:'var(--muted)'}}> / {items.length}</span>}</div></div>
        <div className="stat"><div className="stat-label">Shipping</div><div className="stat-value">{fmt$(totalShip)}</div></div>
        <div className="stat"><div className="stat-label">Tax</div><div className="stat-value">{fmt$(totalTax)}</div></div>
        <div className="stat"><div className="stat-label">Total Cost</div><div className="stat-value">{fmt$(totalCost)}</div></div>
      </div>

      <div className="filter-bar">
        <div className="filter-group"><label>Search</label><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Name, ID, vendor" style={{width:170}}/></div>
        <div className="filter-group"><label>Type</label>
          <select value={filterSrc} onChange={e=>setFilterSrc(e.target.value)} style={{width:130}}>
            <option value="">All</option>{srcTypes.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>Vendor</label>
          <select value={filterVendor} onChange={e=>setFilterVendor(e.target.value)} style={{width:130}}>
            <option value="">All</option>{vendors.map(v=><option key={v}>{v}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>Condition</label>
          <select value={filterCondition} onChange={e=>setFilterCondition(e.target.value)} style={{width:120}}>
            <option value="">All</option>{conditions.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>From</label><input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)} style={{width:140}}/></div>
        <div className="filter-group"><label>To</label><input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)} style={{width:140}}/></div>
        {hasFilters&&<button className="sm ghost" onClick={()=>{setSearch('');setFilterSrc('');setFilterVendor('');setFilterCondition('');setFilterDateFrom('');setFilterDateTo('');}}>Clear</button>}
      </div>

      <div className="overflow-x">
        {loading?<div className="empty">Loading…</div>:filtered.length===0?<div className="empty">No items match filters.</div>:(
          <table>
            <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Vendor</th><th>Order #</th><th>Date</th><th>Qty</th><th>Unit Cost</th><th>Ship Alloc</th><th>Tax Alloc</th><th>Line Total</th><th></th></tr></thead>
            <tbody>
              {filtered.map(i=>(
                <tr key={i.item_id}>
                  <td style={{fontFamily:'monospace',fontSize:11,cursor:'pointer',color:'var(--accent)'}} onClick={()=>setViewItem(i)}>{i.item_id}</td>
                  <td><div style={{fontWeight:500}}>{i.item_name}</div>{i.variant&&<div style={{fontSize:11,color:'var(--muted)'}}>{i.variant}</div>}</td>
                  <td>{srcBadge(i.source_type)}</td>
                  <td style={{fontSize:12}}>{i.vendor||'—'}</td>
                  <td>{i.order_number?<span className="order-link" onClick={()=>onOpenOrder(i.order_number)}>{i.order_number}</span>:'—'}</td>
                  <td style={{fontSize:12}}>{fmtDate(i.date_purchased)}</td>
                  <td>{i.qty_purchased}</td>
                  <td>{fmt$(i.unit_cost)}</td>
                  <td style={{fontSize:12}}>{fmt$(i.shipping_allocated)}</td>
                  <td style={{fontSize:12}}>{fmt$(i.tax_allocated)}</td>
                  <td style={{fontWeight:500}}>{fmt$(i.total_line_cost)}</td>
                  <td><Kebab items={[
                    {label:'View',action:()=>setViewItem(i)},
                    {label:'Edit',action:()=>{setViewItem(null);setEditItem(i);}},
                    {label:'Delete',danger:true,action:()=>del(i)}
                  ]}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {viewItem&&!editItem&&(
        <Modal title={`${viewItem.item_id} — ${viewItem.item_name}`} onClose={()=>setViewItem(null)} width="560px">
          <div className="view-grid" style={{marginBottom:20}}>
            {[['Item ID',viewItem.item_id],['Source Type',viewItem.source_type],['Variant',viewItem.variant||'—'],['Category',viewItem.category||'—'],
              ['Vendor',viewItem.vendor||'—'],
              ['Order #',viewItem.order_number?<span className="order-link" onClick={()=>{setViewItem(null);onOpenOrder(viewItem.order_number);}}>{viewItem.order_number}</span>:'—'],
              ['Date',fmtDate(viewItem.date_purchased)],['Condition',viewItem.condition||'—'],
              ['Qty Purchased',viewItem.qty_purchased],['Unit Cost',fmt$(viewItem.unit_cost)],
              ['Shipping Alloc',fmt$(viewItem.shipping_allocated)],['Tax Alloc',fmt$(viewItem.tax_allocated)],
              ['Line Total',fmt$(viewItem.total_line_cost)],['Location',viewItem.location||'—'],
              ['Notes',viewItem.notes||'—'],['',null],
            ].filter(([,v])=>v!==null).map(([k,v])=>(
              <div key={k}><div className="vk">{k}</div><div className="vv">{v}</div></div>
            ))}
          </div>
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="danger sm" onClick={()=>del(viewItem)}>Delete</button>
            <button className="primary sm" onClick={()=>setEditItem(viewItem)}>Edit</button>
          </div>
        </Modal>
      )}

      {editItem&&(
        <Modal title={`Edit ${editItem.item_id}`} onClose={()=>setEditItem(null)} width="640px">
          <PurchasedItemForm initial={editItem} onSave={saveEdit} onClose={()=>setEditItem(null)}/>
        </Modal>
      )}
    </>
  );
}

function PurchasedItemForm({initial={},onSave,onClose}){
  const [f,setF]=useState({item_name:'',variant:'',category:'',vendor:'',date_purchased:'',qty_purchased:1,qty_remaining:1,unit_cost:'',condition:'New',source_type:'Electronics',location:'',notes:'',...initial});
  const handle=e=>setF(p=>({...p,[e.target.name]:e.target.value}));
  return(
    <form onSubmit={e=>{e.preventDefault();onSave(f);}}>
      <div className="form-grid">
        <div className="form-group full"><label>Item Name *</label><input name="item_name" value={f.item_name} onChange={handle} required/></div>
        <div className="form-group"><label>Source Type *</label><select name="source_type" value={f.source_type} onChange={handle}>{SOURCE_TYPES.map(s=><option key={s}>{s}</option>)}</select></div>
        <div className="form-group"><label>Category</label><input name="category" value={f.category||''} onChange={handle}/></div>
        <div className="form-group"><label>Vendor</label><input name="vendor" value={f.vendor||''} onChange={handle}/></div>
        <div className="form-group"><label>Date Purchased</label><input type="date" name="date_purchased" value={f.date_purchased?fmtDate(f.date_purchased):''} onChange={handle}/></div>
        <div className="form-group"><label>Variant</label><input name="variant" value={f.variant||''} onChange={handle}/></div>
        <div className="form-group"><label>Condition</label><select name="condition" value={f.condition} onChange={handle}>{CONDITIONS.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="form-group"><label>Qty Purchased</label><input type="number" name="qty_purchased" value={f.qty_purchased} onChange={handle} min="1"/></div>
        <div className="form-group"><label>Unit Cost</label><input type="number" name="unit_cost" value={f.unit_cost} onChange={handle} step="0.01" min="0"/></div>
        <div className="form-group"><label>Location</label><input name="location" value={f.location||''} onChange={handle}/></div>
        <div className="form-group full"><label>Notes</label><textarea name="notes" value={f.notes||''} onChange={handle} rows={2}/></div>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
        <button type="button" onClick={onClose}>Cancel</button>
        <button type="submit" className="primary">Save</button>
      </div>
    </form>
  );
}

// ── Stock Tab ─────────────────────────────
function StockTab(){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [filterSrc,setFilterSrc]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [receiveItem,setReceiveItem]=useState(null);
  const [purchasedItems,setPurchasedItems]=useState([]);
  const [f,setF]=useState({name:'',variant:'',category:'',source_type:'Electronics',location:'',notes:''});
  const [rf,setRf]=useState({stock_item_id:'',purchased_item_id:'',qty_received:1,unit_cost:''});
  const handle=e=>setF(p=>({...p,[e.target.name]:e.target.value}));

  const load=useCallback(async()=>{
    setLoading(true);
    const p=new URLSearchParams();
    if(search)p.set('search',search);
    if(filterSrc)p.set('source_type',filterSrc);
    setItems(await api('/api/stock?'+p));
    setLoading(false);
  },[search,filterSrc]);
  useEffect(()=>{load();},[load]);

  const srcTypes=useMemo(()=>[...new Set(items.map(i=>i.source_type).filter(Boolean))].sort(),[items]);

  const addStock=async e=>{e.preventDefault();await api('/api/stock',{method:'POST',body:f});setF({name:'',variant:'',category:'',source_type:'Electronics',location:'',notes:''});setShowAdd(false);load();};
  const openReceive=async item=>{setReceiveItem(item);setRf({stock_item_id:item.id,purchased_item_id:'',qty_received:1,unit_cost:item.unit_cost||''});setPurchasedItems(await api('/api/purchased-items'));};
  const doReceive=async e=>{e.preventDefault();await api('/api/stock/receive',{method:'POST',body:rf});setReceiveItem(null);load();};
  const del=async item=>{if(!confirm(`Delete stock item ${item.sku}?`))return;await api(`/api/stock/${item.id}`,{method:'DELETE'});load();};

  const lowStock=items.filter(i=>i.qty_on_hand===1).length;
  const outStock=items.filter(i=>i.qty_on_hand===0).length;
  const totalQty=items.reduce((s,i)=>s+Number(i.qty_on_hand||0),0);

  return(
    <>
      <div className="stats-row">
        <div className="stat"><div className="stat-label">Stock Items</div><div className="stat-value">{items.length}</div></div>
        <div className="stat"><div className="stat-label">Total Units</div><div className="stat-value">{totalQty}</div></div>
        <div className="stat"><div className="stat-label">Low Stock</div><div className="stat-value" style={{color:'var(--warn)'}}>{lowStock}</div></div>
        <div className="stat"><div className="stat-label">Out of Stock</div><div className="stat-value" style={{color:'var(--danger)'}}>{outStock}</div></div>
      </div>

      <div className="filter-bar">
        <div className="filter-group"><label>Search</label><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Name or SKU" style={{width:180}}/></div>
        <div className="filter-group"><label>Type</label>
          <select value={filterSrc} onChange={e=>setFilterSrc(e.target.value)} style={{width:130}}>
            <option value="">All</option>{srcTypes.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        {(search||filterSrc)&&<button className="sm ghost" onClick={()=>{setSearch('');setFilterSrc('');}}>Clear</button>}
        <button className="primary" style={{marginLeft:'auto'}} onClick={()=>setShowAdd(a=>!a)}>+ New Stock Item</button>
      </div>

      {showAdd&&(
        <div className="section" style={{maxWidth:640,marginBottom:16}}>
          <h2>New Stock Item</h2>
          <form onSubmit={addStock}>
            <div className="form-grid">
              <div className="form-group full"><label>Canonical Name *</label><input name="name" value={f.name} onChange={handle} required placeholder="e.g. Keeppower 18650

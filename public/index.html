    api(`/api/stock/${initialItem.id}`).then(data => {
      setItem(data);
      setLedger(data.ledger || []);
      setLoading(false);
    });
  }, [initialItem.id]);

  const displayedLedger = showAllLedger ? ledger : ledger.slice(0, 10);

  const reasonLabel = r => ({
	  adjustment:        'Adjustment',
	  Found:             'Found',
	  Lost:              'Lost',
	  Damaged:           'Damaged',
	  Correction:        'Correction',
	  Other:             'Other',
	  order_deleted:     'Order Deleted',
	  purchase_deleted:  'Purchase Deleted',
  }[r] || r);

  return (
    <Modal
      title={`${item.sku} — ${item.name}`}
      onClose={onClose}
      width="640px"
      headerActions={
        <Kebab items={[
          { label: 'Edit', action: () => { onClose(); onEdit(item); }},
          { label: 'Adjust', action: () => { onClose(); onAdjust(item); }},
          { label: item.active ? 'Retire' : 'Activate', action: () => { onClose(); item.active ? onRetire(item) : onActivate(item); }},
        ]}/>
      }
    >
      {loading ? <div className="empty">Loading…</div> : (
        <>
          <div className="view-grid" style={{marginBottom:16}}>
            {[
              ['SKU', <span style={{fontFamily:'monospace'}}>{item.sku}</span>],
              ['Status', <span className="badge" style={item.active ? {background:'#102010',color:'var(--success)'} : {background:'#2a1010',color:'var(--danger)'}}>{item.active ? 'Active' : 'Retired'}</span>],
              ['Name', item.name],
              ['Category', catBadge(item.category)],
              ['Variant', item.variant || '—'],
              ['On Hand', <strong style={{color: item.qty_on_hand === 0 ? 'var(--danger)' : item.low_stock_threshold && item.qty_on_hand <= item.low_stock_threshold ? 'var(--warn)' : 'var(--success)'}}>{item.qty_on_hand}</strong>],
              ['Low Stock Threshold', item.low_stock_threshold ?? '—'],
              ['Avg Cost', fmt$(item.avg_cost)],
			  ['Replacement Cost', fmt$(item.unit_cost)],
              ['Location', item.location || '—'],
              ['Notes', item.notes || '—'],
            ].map(([k,v]) => (
              <div key={k}><div className="vk">{k}</div><div className="vv">{v}</div></div>
            ))}
          </div>

          <div style={{borderTop:'1px solid var(--border)',paddingTop:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <h3>History</h3>
              {ledger.length > 10 && (
                <button className="toggle-link" onClick={() => setShowAllLedger(p => !p)}>
                  {showAllLedger ? 'Show less' : `View all ${ledger.length}`}
                </button>
              )}
            </div>
            {ledger.length === 0 ? <div className="empty" style={{padding:16}}>No history yet.</div> : (
              <div className="overflow-x">
                <table>
                  <thead><tr><th>Date</th><th>Change</th><th>Reason</th><th>Ref</th><th>Notes</th></tr></thead>
                  <tbody>
                    {displayedLedger.map(l => (
					  <tr key={l.id}>
						<td style={{ fontSize: 11 }}>{fmtDate(l.created_at)}</td>
						<td style={{ fontWeight: 600, color: l.qty_change > 0 ? 'var(--success)' : 'var(--danger)' }}>
						  {l.qty_change > 0 ? '+' : ''}{l.qty_change}
						</td>
						<td style={{ fontSize: 12 }}>
						  {l.reason === 'purchase' || l.reason === 'purchase_edit' ||
						   l.reason === 'purchase_linked' || l.reason === 'purchase_unlinked'
							? l.order_number
							  ? <span className="order-link" onClick={() => { onClose(); onOpenOrder(l.order_number); }}>{l.order_number}</span>
							  : l.purchased_item_ref || '—'
							: reasonLabel(l.reason)
						  }
						</td>
						<td style={{ fontFamily: 'monospace', fontSize: 11 }}>
						  {l.purchased_item_ref
							? <span className="order-link" onClick={() => { onClose(); onOpenItem(l.purchased_item_ref); }}>{l.purchased_item_ref}</span>
							: '—'}
						</td>
						<td style={{ fontSize: 12, color: 'var(--muted)' }}>{l.notes || '—'}</td>
					  </tr>
					))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </>
      )}
    </Modal>
  );
}

// ── Global Ledger Modal ─────────────────────────────
function GlobalLedgerModal({ onClose, onOpenOrder, onOpenItem }) {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadingMore, setLoadingMore] = useState(false);
  const [hasMore, setHasMore] = useState(true);
  const PAGE = 200;

  useEffect(() => {
    api(`/api/stock?ledger=true&limit=${PAGE}&offset=0`).then(data => {
      setRows(data);
      setHasMore(data.length === PAGE);
      setLoading(false);
    });
  }, []);

  const loadMore = async () => {
    setLoadingMore(true);
    const data = await api(`/api/stock?ledger=true&limit=${PAGE}&offset=${rows.length}`);
    setRows(r => [...r, ...data]);
    setHasMore(data.length === PAGE);
    setLoadingMore(false);
  };

  const reasonLabel = r => ({
    adjustment:       'Adjustment',
    Found:            'Found',
    Lost:             'Lost',
    Damaged:          'Damaged',
    Correction:       'Correction',
    Other:            'Other',
    order_deleted:    'Order Deleted',
    purchase_deleted: 'Purchase Deleted',
  }[r] || r);

return (
    <Modal title="Stock Ledger — All Items" onClose={onClose} width="900px">
      {loading ? <div className="empty">Loading…</div> : rows.length === 0 ? <div className="empty">No ledger entries yet.</div> : (
        <>
          <div className="overflow-x">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>SKU</th>
                  <th>Item Name</th>
                  <th>Change</th>
                  <th>Reason</th>
                  <th>Ref</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody>
                {rows.map(l => (
                  <tr key={l.id}>
                    <td style={{ fontSize: 11 }}>{fmtDate(l.created_at)}</td>
                    <td style={{ fontFamily: 'monospace', fontSize: 11 }}>{l.sku}</td>
                    <td style={{ fontSize: 12 }}>{l.stock_name}</td>
                    <td style={{ fontWeight: 600, color: l.qty_change > 0 ? 'var(--success)' : 'var(--danger)' }}>
                      {l.qty_change > 0 ? '+' : ''}{l.qty_change}
                    </td>
                    <td style={{ fontSize: 12 }}>
                      {l.reason === 'purchase' || l.reason === 'purchase_edit' ||
                       l.reason === 'purchase_linked' || l.reason === 'purchase_unlinked'
                        ? l.order_number
                          ? <span className="order-link" onClick={() => { onClose(); onOpenOrder(l.order_number); }}>{l.order_number}</span>
                          : l.purchased_item_ref || '—'
                        : reasonLabel(l.reason)
                      }
                    </td>
                    <td style={{ fontFamily: 'monospace', fontSize: 11 }}>
                      {l.purchased_item_ref
                        ? <span className="order-link" onClick={() => { onClose(); onOpenItem(l.purchased_item_ref); }}>{l.purchased_item_ref}</span>
                        : '—'}
                    </td>
                    <td style={{ fontSize: 12, color: 'var(--muted)' }}>{l.notes || '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {hasMore && (
            <div style={{ textAlign: 'center', marginTop: 16 }}>
              <button className="sm ghost" onClick={loadMore} disabled={loadingMore}>
                {loadingMore ? 'Loading…' : 'Load More'}
              </button>
            </div>
          )}
        </>
      )}
    </Modal>
  );
}

// ── Stock Tab ─────────────────────────────
function StockTab({ onOpenOrder, onOpenItem }) {
  const [showLedger, setShowLedger] = useState(false);
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [filterActive, setFilterActive] = useState('true');
  const [showAdd, setShowAdd] = useState(false);
  const [viewItem, setViewItem] = useState(null);
  const [editStockItem, setEditStockItem] = useState(null);
  const [adjustItem, setAdjustItem] = useState(null);
  const { sortKey: sSortKey, sortDir: sSortDir, toggle: sToggle, sort: sSort } = useSort('name');

  const load = useCallback(async () => {
    setLoading(true);
    const p = new URLSearchParams();
    if (search) p.set('search', search);
    if (filterCat) p.set('category', filterCat);
    p.set('active', filterActive);
    const d = await api('/api/stock?' + p);
    setItems(d);
    setLoading(false);
  }, [search, filterCat, filterActive]);

  useEffect(() => {
    let ignore = false;
    (async () => {
      setLoading(true);
      const p = new URLSearchParams();
      if (search) p.set('search', search);
      if (filterCat) p.set('category', filterCat);
      p.set('active', filterActive);
      const d = await api('/api/stock?' + p);
      if (!ignore) setItems(d);
      setLoading(false);
    })();
    return () => { ignore = true; };
  }, [search, filterCat, filterActive]);

  const catTypes = useMemo(() => [...new Set(items.map(i => i.category).filter(Boolean))].sort(), [items]);

  const retire = async item => {
    if (!confirm(`Retire ${item.sku}?`)) return;
    await api(`/api/stock/${item.id}`, { method: 'PUT', body: { _toggle_active: false } });
    load();
  };

  const activate = async item => {
    await api(`/api/stock/${item.id}`, { method: 'PUT', body: { _toggle_active: true } });
    load();
  };

  const del = async item => {
    if (!confirm(`Delete stock item ${item.sku}? This cannot be undone.`)) return;
    try {
      await api(`/api/stock/${item.id}`, { method: 'DELETE' });
      load();
    } catch(e) { alert(e.message); }
  };

  // Stats — respect threshold for low stock
  const isLow = i => i.active && i.low_stock_threshold != null && i.qty_on_hand > 0 && i.qty_on_hand <= i.low_stock_threshold;
  const isOut = i => i.qty_on_hand === 0;
  const lowStock = items.filter(isLow).length;
  const outStock  = items.filter(isOut).length;
  const totalQty  = items.reduce((s, i) => s + Number(i.qty_on_hand || 0), 0);
  const totalValue = items.reduce((s, i) => s + Number(i.qty_on_hand || 0) * Number(i.avg_cost || 0), 0);

  return (
    <>
      <div className="stats-row">
        <div className="stat"><div className="stat-label">Stock Items</div><div className="stat-value">{items.length}</div></div>
        <div className="stat"><div className="stat-label">Total Units</div><div className="stat-value">{totalQty}</div></div>
        <div className="stat"><div className="stat-label">Inventory Cost</div><div className="stat-value">{fmt$(totalValue)}</div></div>
        <div className="stat"><div className="stat-label">Low Stock</div><div className="stat-value" style={{ color: 'var(--warn)' }}>{lowStock}</div></div>
        <div className="stat"><div className="stat-label">Out of Stock</div><div className="stat-value" style={{ color: 'var(--danger)' }}>{outStock}</div></div>
      </div>

      <div className="filter-bar">
        <div className="filter-group"><label>Search</label><input value={search} onChange={e => setSearch(e.target.value)} placeholder="Name or SKU" style={{ width: 180 }} /></div>
        <div className="filter-group"><label>Category</label>
          <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{ width: 130 }}>
            <option value="">All</option>{catTypes.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>Status</label>
          <select value={filterActive} onChange={e => setFilterActive(e.target.value)} style={{ width: 110 }}>
            <option value="true">Active</option>
            <option value="false">Retired</option>
            <option value="all">All</option>
          </select>
        </div>
        {(search || filterCat) && <button className="sm ghost" onClick={() => { setSearch(''); setFilterCat(''); }}>Clear</button>}
        <button className="sm ghost" onClick={() => setShowLedger(true)}>Ledger</button>
		<button className="primary" style={{ marginLeft: 'auto' }} onClick={() => setShowAdd(true)}>+ New Stock Item</button>
      </div>

      {showAdd && (
        <Modal title="New Stock Item" onClose={() => setShowAdd(false)} width="560px">
          <StockItemForm
            stockItems={items}
            onSave={async f => {
              await api('/api/stock', { method: 'POST', body: f });
              setShowAdd(false); load();
            }}
            onClose={() => setShowAdd(false)}
          />
        </Modal>
      )}

      <div className="overflow-x">
        {loading ? <div className="empty">Loading…</div> : items.length === 0
          ? <div className="empty">No stock items found.</div> : (
            <table>
              <thead><tr>
				<SortTh label="SKU"      colKey="sku"          sortKey={sSortKey} sortDir={sSortDir} onToggle={sToggle}/>
				<SortTh label="Name"     colKey="name"         sortKey={sSortKey} sortDir={sSortDir} onToggle={sToggle}/>
				<SortTh label="Category" colKey="category"     sortKey={sSortKey} sortDir={sSortDir} onToggle={sToggle}/>
				<SortTh label="Status"   colKey="active"       sortKey={sSortKey} sortDir={sSortDir} onToggle={sToggle}/>
				<SortTh label="On Hand"  colKey="qty_on_hand"  sortKey={sSortKey} sortDir={sSortDir} onToggle={sToggle}/>
				<SortTh label="Avg Cost" colKey="unit_cost"    sortKey={sSortKey} sortDir={sSortDir} onToggle={sToggle}/>
				<SortTh label="Location" colKey="location"     sortKey={sSortKey} sortDir={sSortDir} onToggle={sToggle}/>
				<th></th>
			  </tr></thead>
              <tbody>
                {sSort(items).map(i => {
                  const sc = isOut(i) ? 'badge-out' : isLow(i) ? 'badge-low' : 'badge-ok';
                  return (
                    <tr key={i.id}>
                      <td style={{ fontFamily: 'monospace', fontSize: 11, cursor: 'pointer', color: 'var(--accent)' }} onClick={() => setViewItem(i)}>{i.sku}</td>
                      <td><div style={{ fontWeight: 500 }}>{i.name}</div>{i.variant && <div style={{ fontSize: 11, color: 'var(--muted)' }}>{i.variant}</div>}</td>
                      <td>{catBadge(i.category)}</td>
                      <td><span className="badge" style={i.active ? {background:'#102010',color:'var(--success)'} : {background:'#2a1010',color:'var(--danger)'}}>{i.active ? 'Active' : 'Retired'}</span></td>
                      <td><span className={`badge ${sc}`}>{i.qty_on_hand}</span></td>
                      <td>{fmt$(i.unit_cost)}</td>
                      <td style={{ fontSize: 12 }}>{i.location || '—'}</td>
                      <td><Kebab items={[
                        { label: 'View', action: () => setViewItem(i) },
                        { label: 'Edit', action: () => setEditStockItem(i) },
                        { label: 'Adjust', action: () => setAdjustItem(i) },
                        { label: i.active ? 'Retire' : 'Activate', action: () => i.active ? retire(i) : activate(i) },
                        { label: 'Delete', danger: true, action: () => del(i) }
                      ]} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
      </div>

      {viewItem && (
		  <StockItemViewModal
			item={viewItem}
			onClose={() => setViewItem(null)}
			onEdit={i => { setViewItem(null); setEditStockItem(i); }}
			onAdjust={i => { setViewItem(null); setAdjustItem(i); }}
			onRetire={i => { setViewItem(null); retire(i); }}
			onActivate={i => { setViewItem(null); activate(i); }}
			onOpenOrder={onOpenOrder}
			onOpenItem={onOpenItem}
		  />
		)}

      {editStockItem && (
        <Modal title={`Edit ${editStockItem.sku}`} onClose={() => setEditStockItem(null)} width="520px">
          <StockItemForm initial={editStockItem} stockItems={items} onSave={async f => {
            await api(`/api/stock/${editStockItem.id}`, { method: 'PUT', body: f });
            setEditStockItem(null); load();
          }} onClose={() => setEditStockItem(null)} />
        </Modal>
      )}

      {adjustItem && (
        <AdjustModal
          item={adjustItem}
          onClose={() => setAdjustItem(null)}
          onSaved={() => { setAdjustItem(null); load(); }}
        />
      )}
	  
	  {showLedger && (
		<GlobalLedgerModal
		  onClose={() => setShowLedger(false)}
		  onOpenOrder={onOpenOrder}
		  onOpenItem={onOpenItem}
		/>
	  )}
    </>
  );
}

// ── Builds ────────────────────────────────
function BuildsTab({tiers}){
  const [builds,setBuilds]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(null);
  const [usageModal,setUsageModal]=useState(null);

  const load=async()=>{setLoading(true);setBuilds(await api('/api/builds'));setLoading(false);};
  useEffect(()=>{let ignore=false;(async()=>{setLoading(true);const d=await api('/api/builds');if(!ignore)setBuilds(d);setLoading(false);})();return()=>{ignore=true;};},[]);

  const save=async f=>{
    if(modal==='add')await api('/api/builds',{method:'POST',body:f});
    else await api(`/api/builds/${modal.build_id}`,{method:'PUT',body:f});
    setModal(null);load();
  };
  const del=async b=>{if(!confirm(`Delete build ${b.build_id}?`))return;await api(`/api/builds/${b.build_id}`,{method:'DELETE'});load();};
  const totalProfit=builds.reduce((s,b)=>s+Number(b.profit||0),0);
  const sold=builds.filter(b=>b.status==='Sold').length;

  return(
    <>
      <div className="stats-row">
        <div className="stat"><div className="stat-label">Builds</div><div className="stat-value">{builds.length}</div></div>
        <div className="stat"><div className="stat-label">Sold</div><div className="stat-value">{sold}</div></div>
        <div className="stat"><div className="stat-label">Total Profit</div><div className="stat-value" style={{color:totalProfit>=0?'var(--success)':'var(--danger)'}}>{fmt$(totalProfit)}</div></div>
      </div>
      <div className="toolbar"><button className="primary" onClick={()=>setModal('add')}>+ New Build</button></div>
      <div className="overflow-x">
        {loading?<div className="empty">Loading…</div>:builds.length===0?<div className="empty">No builds yet.</div>:(
          <table>
            <thead><tr><th>ID</th><th>Hilt</th><th>Customer</th><th>Tier</th><th>Parts</th><th>Labor</th><th>Total</th><th>Sold</th><th>Profit</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {builds.map(b=>(
                <tr key={b.build_id}>
                  <td style={{fontFamily:'monospace',fontSize:12}}>{b.build_id}</td>
                  <td style={{fontFamily:'monospace',fontSize:11}}>{b.hilt_item_id||'—'}</td>
                  <td>{b.customer||'—'}</td><td>{b.tier_name||'—'}</td>
                  <td>{fmt$(b.parts_cost)}</td><td>{fmt$(b.labor_value)}</td>
                  <td>{fmt$(b.total_build_cost)}</td><td>{fmt$(b.sold_price)}</td>
                  <td style={{color:Number(b.profit)>=0?'var(--success)':'var(--danger)',fontWeight:500}}>{fmt$(b.profit)}</td>
                  <td><span className="badge" style={{background:'#1e2a1e',color:'var(--accent2)'}}>{b.status}</span></td>
                  <td><Kebab items={[{label:'Parts Used',action:()=>setUsageModal(b)},{label:'Edit',action:()=>setModal(b)},{label:'Delete',danger:true,action:()=>del(b)}]}/></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {modal&&<Modal title={modal==='add'?'New Build':`Edit ${modal.build_id}`} onClose={()=>setModal(null)}><BuildForm initial={modal==='add'?{}:modal} tiers={tiers} onSave={save} onClose={()=>setModal(null)}/></Modal>}
      {usageModal&&<Modal title={`Parts — ${usageModal.build_id}`} onClose={()=>setUsageModal(null)}><UsagePanel buildId={usageModal.build_id}/></Modal>}
    </>
  );
}

function BuildForm({initial={},tiers,onSave,onClose}){
  const [f,setF]=useState({hilt_item_id:'',customer:'',tier_id:'',parts_cost:'',labor_value:'',target_price:'',listed_price:'',sold_price:'',date_sold:'',status:'In Progress',notes:'',...initial,tier_id:initial.tier_id??''});
  const handle=e=>setF(p=>({...p,[e.target.name]:e.target.value}));
  const totalCost=(Number(f.parts_cost)||0)+(Number(f.labor_value)||0);
  const profit=(Number(f.sold_price)||0)-totalCost;
  return(
    <form onSubmit={e=>{e.preventDefault();onSave(f);}}>
      <div className="form-grid">
        <div className="form-group"><label>Hilt Item ID</label><input name="hilt_item_id" value={f.hilt_item_id} onChange={handle} placeholder="HB-001"/></div>
        <div className="form-group"><label>Customer</label><input name="customer" value={f.customer} onChange={handle}/></div>
        <div className="form-group"><label>Build Tier</label><select name="tier_id" value={f.tier_id} onChange={handle}><option value="">— select —</option>{tiers.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></div>
        <div className="form-group"><label>Status</label><select name="status" value={f.status} onChange={handle}>{['In Progress','Complete','Sold','On Hold'].map(s=><option key={s}>{s}</option>)}</select></div>
        <div className="form-group"><label>Parts Cost</label><input type="number" name="parts_cost" value={f.parts_cost} onChange={handle} step="0.01" min="0"/></div>
        <div className="form-group"><label>Labor Value</label><input type="number" name="labor_value" value={f.labor_value} onChange={handle} step="0.01" min="0"/></div>
        <div className="form-group"><label>Target Price</label><input type="number" name="target_price" value={f.target_price} onChange={handle} step="0.01" min="0"/></div>
        <div className="form-group"><label>Listed Price</label><input type="number" name="listed_price" value={f.listed_price} onChange={handle} step="0.01" min="0"/></div>
        <div className="form-group"><label>Sold Price</label><input type="number" name="sold_price" value={f.sold_price} onChange={handle} step="0.01" min="0"/></div>
        <div className="form-group"><label>Date Sold</label><input type="date" name="date_sold" value={f.date_sold} onChange={handle}/></div>
        <div className="form-group full"><label>Notes</label><textarea name="notes" value={f.notes} onChange={handle} rows={2}/></div>
      </div>
      <div style={{background:'var(--surface)',borderRadius:'var(--radius)',padding:'10px 14px',marginTop:12,fontSize:13,display:'flex',gap:24}}>
        <span>Total Cost: <strong>{fmt$(totalCost)}</strong></span>
        <span>Profit: <strong style={{color:profit>=0?'var(--success)':'var(--danger)'}}>{fmt$(profit)}</strong></span>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
        <button type="button" onClick={onClose}>Cancel</button>
        <button type="submit" className="primary">Save</button>
      </div>
    </form>
  );
}

function UsagePanel({buildId}){
  const [usage,setUsage]=useState([]);
  const [stock,setStock]=useState([]);
  const [f,setF]=useState({stock_item_id:'',qty_used:1,unit_cost:''});
  const load=async()=>{const [u,s]=await Promise.all([api(`/api/usage?build_id=${buildId}`),api('/api/stock')]);setUsage(u);setStock(s);};
  useEffect(()=>{load();},[buildId]);
  const pickStock=id=>{const s=stock.find(s=>s.id==id);setF(p=>({...p,stock_item_id:id,unit_cost:s?s.unit_cost||'':''}));};
  const add=async e=>{e.preventDefault();await api('/api/usage',{method:'POST',body:{...f,build_id:buildId}});setF({stock_item_id:'',qty_used:1,unit_cost:''});load();};
  const del=async id=>{await api(`/api/usage?id=${id}`,{method:'DELETE'});load();};
  const total=usage.reduce((s,u)=>s+Number(u.total_cost||0),0);
  return(
    <div>
      <table style={{marginBottom:16}}>
        <thead><tr><th>SKU</th><th>Name</th><th>Qty</th><th>Unit Cost</th><th>Total</th><th></th></tr></thead>
        <tbody>
          {usage.map(u=><tr key={u.id}><td style={{fontFamily:'monospace',fontSize:11}}>{u.sku}</td><td>{u.name}</td><td>{u.qty_used}</td><td>{fmt$(u.unit_cost)}</td><td>{fmt$(u.total_cost)}</td><td><button className="sm danger" onClick={()=>del(u.id)}>✕</button></td></tr>)}
          {usage.length===0&&<tr><td colSpan={6} style={{color:'var(--muted)',textAlign:'center',padding:16}}>No parts linked.</td></tr>}
        </tbody>
      </table>
      <div style={{textAlign:'right',marginBottom:16,fontWeight:500}}>Total: {fmt$(total)}</div>
      <form onSubmit={add} style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr auto',gap:8,alignItems:'end'}}>
        <div><label style={{fontSize:11,color:'var(--muted)'}}>Stock Item</label><select value={f.stock_item_id} onChange={e=>pickStock(e.target.value)} required><option value="">— select —</option>{stock.map(s=><option key={s.id} value={s.id}>{s.sku} — {s.name} (qty: {s.qty_on_hand})</option>)}</select></div>
        <div><label style={{fontSize:11,color:'var(--muted)'}}>Qty</label><input type="number" value={f.qty_used} onChange={e=>setF(p=>({...p,qty_used:e.target.value}))} min="1" required/></div>
        <div><label style={{fontSize:11,color:'var(--muted)'}}>Unit Cost</label><input type="number" value={f.unit_cost} onChange={e=>setF(p=>({...p,unit_cost:e.target.value}))} step="0.01"/></div>
        <button type="submit" className="primary">Add</button>
      </form>
    </div>
  );
}

// ── Tiers Tab ─────────────────────────────
function TiersTab({tiers,onRefresh}){
  const [name,setName]=useState('');
  const add=async e=>{e.preventDefault();await api('/api/tiers',{method:'POST',body:{name}});setName('');onRefresh();};
  const del=async id=>{if(!confirm('Delete this tier?'))return;await api(`/api/tiers?id=${id}`,{method:'DELETE'});onRefresh();};
  return(
    <div style={{maxWidth:400}}>
      <h2>Build Tiers</h2>
      {tiers.map(t=>(
        <div key={t.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',border:'1px solid var(--border)',borderRadius:'var(--radius)',marginBottom:6}}>
          <span>{t.name}</span><button className="sm danger" onClick={()=>del(t.id)}>Delete</button>
        </div>
      ))}
      <form onSubmit={add} style={{display:'flex',gap:8,marginTop:16}}>
        <input placeholder="New tier name" value={name} onChange={e=>setName(e.target.value)} required/>
        <button type="submit" className="primary">Add</button>
      </form>
    </div>
  );
}

// ── Import Tab ────────────────────────────────────────────────────────────────
function ImportTab() {
  const [invCSV, setInvCSV] = useState('');
  const [ordCSV, setOrdCSV] = useState('');
  const [result, setResult]   = useState(null);
  const [loading, setLoading] = useState(false);
  const invRef = useRef();
  const ordRef = useRef();

  const readFile = (e, setter) => {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = ev => setter(ev.target.result);
    r.readAsText(file);
  };

  const runImport = async () => {
    setLoading(true); setResult(null);
    try {
      // Orders first, then items
      const ordRes = await api('/api/import', { method: 'POST', body: { mode: 'orders', csv: ordCSV } });
      const invRes = await api('/api/import', { method: 'POST', body: { mode: 'inventory', csv: invCSV } });
      setResult({ ordRes, invRes });
      setInvCSV(''); setOrdCSV('');
      if (invRef.current) invRef.current.value = '';
      if (ordRef.current) ordRef.current.value = '';
    } catch (e) {
      setResult({ error: e.message });
    }
    setLoading(false);
  };

  const ready = invCSV && ordCSV && !loading;

  return (
    <div style={{ maxWidth: 600 }}>
      <h2>Bulk Import</h2>
      <p style={{ color: 'var(--muted)', marginBottom: 24, fontSize: 13 }}>
        Load both CSVs then click Import. Orders are submitted first automatically.
      </p>

      {/* Orders CSV */}
      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: 20, marginBottom: 16 }}>
        <h2 style={{ marginBottom: 4 }}>Orders CSV</h2>
        <p style={{ fontSize: 12, color: 'var(--accent2)', marginBottom: 2 }}>Required: order_number, shipping_total, tax_total</p>
        <p style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 12 }}>Optional: vendor, order_date, notes</p>
        <input ref={ordRef} type="file" accept=".csv" onChange={e => readFile(e, setOrdCSV)} style={{ width: '100%' }} />
        {ordCSV && <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6 }}>{ordCSV.trim().split('\n').length - 1} rows</div>}
      </div>

      {/* Purchased Items CSV */}
      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 'var(--radius-lg)', padding: 20, marginBottom: 16 }}>
        <h2 style={{ marginBottom: 4 }}>Purchased Items CSV</h2>
        <p style={{ fontSize: 12, color: 'var(--accent2)', marginBottom: 2 }}>Required: item_name, qty_purchased, unit_cost</p>
        <p style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 12 }}>Optional: order_number, variant, vendor, date_purchased, condition, category, location, notes, shipping_allocated, tax_allocated, stock_item_id</p>
        <input ref={invRef} type="file" accept=".csv" onChange={e => readFile(e, setInvCSV)} style={{ width: '100%' }} />
        {invCSV && <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 6 }}>{invCSV.trim().split('\n').length - 1} rows</div>}
      </div>

      <button className="primary" onClick={runImport} disabled={!ready} style={{ width: '100%', padding: '10px 0' }}>
        {loading ? 'Importing…' : 'Import Both'}
      </button>
      {!invCSV && !ordCSV ? null : (!invCSV || !ordCSV) &&
        <div style={{ fontSize: 12, color: 'var(--warn)', marginTop: 8, textAlign: 'center' }}>
          Both files required before importing.
        </div>
      }

      {result && (
        <div style={{ marginTop: 16 }}>
          {result.error
            ? <div className="result-err">{result.error}</div>
            : <>
                <div className="result-ok">
                  Orders: {result.ordRes.inserted ?? 0} inserted, {result.ordRes.skipped ?? 0} skipped
                  {result.ordRes.errors?.length > 0 &&
                    <div style={{ marginTop: 4, fontSize: 12, color: 'var(--warn)' }}>
                      {result.ordRes.errors.map((e, i) => <div key={i}>{e}</div>)}

                    </div>}
                </div>
                <div className="result-ok" style={{ marginTop: 8 }}>
                  Items: {result.invRes.inserted ?? 0} inserted, {result.invRes.skipped ?? 0} skipped
                  {result.invRes.errors?.length > 0 &&
                    <div style={{ marginTop: 4, fontSize: 12, color: 'var(--warn)' }}>
                      {result.invRes.errors.map((e, i) => <div key={i}>{e}</div>)}
                    </div>}
                </div>
              </>
          }
        </div>
      )}
    </div>
  );
}

// ── App ───────────────────────────────────
function App() {
  const [tab, setTab] = useState('stock');
  const [tiers, setTiers] = useState([]);
  const [orderModal, setOrderModal] = useState(null);
  const [editOrder, setEditOrder] = useState(null);
  const [itemModal, setItemModal] = useState(null); // ← new

  const loadTiers = async () => setTiers(await api('/api/tiers'));
  useEffect(() => { loadTiers(); }, []);

  const openOrderModal = useCallback(async orderNum => {
    const orders = await api('/api/orders');
    const o = orders.find(x => x.order_number === orderNum);
    if (o) setOrderModal(o);
  }, []);

  // ← new: fetch purchased item by item_id and show modal
  const openItemModal = useCallback(async itemId => {
    const item = await api(`/api/purchased-items/${itemId}`);
    if (item) setItemModal(item);
  }, []);

  const tabs = [
    { id: 'stock',     label: 'Stock' },
    { id: 'orders',    label: 'Orders' },
    { id: 'purchased', label: 'Purchased Items' },
    { id: 'builds',    label: 'Builds' },
    { id: 'tiers',     label: 'Build Tiers' },
    { id: 'import',    label: 'Import' },
  ];

  return (
    <>
      <div className="header">
        <h1><img src="/images/logo.png" alt="" style={{ height: 32, verticalAlign: 'middle', marginRight: 8 }} />Saber Tracker</h1>
        <span style={{ fontSize: 12, color: 'var(--muted)' }}>Jedi Master Tech</span>
      </div>
      <div className="content">
        <div className="tab-bar">
          {tabs.map(t => <button key={t.id} className={`tab${tab === t.id ? ' active' : ''}`} onClick={() => setTab(t.id)}>{t.label}</button>)}
        </div>
        {tab === 'stock'     && <StockTab onOpenOrder={openOrderModal} onOpenItem={openItemModal} />}
        {tab === 'orders'    && <OrdersTab />}
        {tab === 'purchased' && <PurchasedItemsTab onOpenOrder={openOrderModal} />}
        {tab === 'builds'    && <BuildsTab tiers={tiers} />}
        {tab === 'tiers'     && <TiersTab tiers={tiers} onRefresh={loadTiers} />}
        {tab === 'import'    && <ImportTab />}
      </div>

      {orderModal && <OrderDetailModal
        order={orderModal}
        onClose={() => setOrderModal(null)}
        onEdit={o => { setOrderModal(null); setEditOrder(o); }}
        onDelete={async o => {
          if (!confirm(`Delete order ${o.order_number}?`)) return;
          await api(`/api/orders?order_number=${encodeURIComponent(o.order_number)}`, { method: 'DELETE' });
          setOrderModal(null);
        }}
      />}

      {editOrder && <NewOrderModal
        editOrder={editOrder}
        onClose={() => setEditOrder(null)}
        onSaved={() => setEditOrder(null)}
      />}

      {/* Cross-tab purchased item view modal */}
      {itemModal && (
        <Modal
          title={`${itemModal.item_id} — ${itemModal.item_name}`}
          onClose={() => setItemModal(null)}
          width="560px"
        >
          <div className="view-grid">
            {[
              ['Item ID',       itemModal.item_id],
              ['Category',      catBadge(itemModal.category)],
              ['Variant',       itemModal.variant || '—'],
              ['Vendor',        itemModal.vendor || '—'],
              ['Order #',       itemModal.order_number
                ? <span className="order-link" onClick={() => { setItemModal(null); openOrderModal(itemModal.order_number); }}>{itemModal.order_number}</span>
                : '—'],
              ['Date',          fmtDate(itemModal.date_purchased)],
              ['Condition',     itemModal.condition || '—'],
              ['Qty Purchased', itemModal.qty_purchased],
              ['Unit Cost',     fmt$(itemModal.unit_cost)],
              ['Shipping Alloc',fmt$(itemModal.shipping_allocated)],
              ['Tax Alloc',     fmt$(itemModal.tax_allocated)],
              ['Line Total',    fmt$(itemModal.total_line_cost)],
              ['Location',      itemModal.location || '—'],
              ['Notes',         itemModal.notes || '—'],
            ].map(([k, v]) => (
              <div key={k}><div className="vk">{k}</div><div className="vv">{v}</div></div>
            ))}
          </div>
        </Modal>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

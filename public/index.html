<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saber Tracker</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script> 
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script> 
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const API = '';

const fmt$ = v => v==null?'—':'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const round2 = v => Math.round(Number(v)*100)/100;
const fmtDate = v => { if(!v)return'—'; const s=String(v); return s.includes('T')?s.split('T')[0]:s; };
const CONDITIONS = ['New','Used','Refurbished','Damaged'];

const categoryColor = str => {
  if (!str) return { bg: '#1e1e2a', color: '#888899' };
  let h = 0;
  for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  const hue = (Math.abs(h) * 137) % 360;
  return { bg: `hsl(${hue},28%,18%)`, color: `hsl(${hue},55%,68%)` };
};

const catBadge = s => {
  const { bg, color } = categoryColor(s);
  return <span className="badge" style={{ background: bg, color }}>{s||'—'}</span>;
};

function CategoryCombobox({ value, onChange }) {
  const [categories, setCategories] = useState([]);
  const [inputVal, setInputVal] = useState(value || '');

  useEffect(() => {
    api('/api/purchased-items?categories=true').then(setCategories);
  }, []);

  useEffect(() => {
    setInputVal(value || '');
  }, [value]);

  return (
    <>
      <input
        name="category"
        value={inputVal}
        onChange={e => { setInputVal(e.target.value); onChange(e); }}
        onFocus={() => setInputVal('')}
        onBlur={() => setInputVal(value || '')}
        list="category-options"
        autoComplete="off"
      />
      <datalist id="category-options">
        {categories.map(c => <option key={c} value={c} />)}
      </datalist>
    </>
  );
}

async function api(path,opts={}) {
  const r=await fetch(API+path,{headers:{'Content-Type':'application/json'},...opts,body:opts.body?JSON.stringify(opts.body):undefined});
  if(r.status===204)return null;
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||r.statusText);
  return d;
}

function parseCSVText(text) {
  const lines=text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){
        if(inQ&&line[i+1]==='"'){cur+='"';i++;continue;} // escaped quote
        inQ=!inQ;continue;
      }
      if(ch===','&&!inQ){vals.push(cur.trim());cur='';continue;}
      cur+=ch;
    }
    vals.push(cur.trim());
    return Object.fromEntries(headers.map((h,i)=>[h,vals[i]??'']));
  });
}

function distribute(items,shipTotal,taxTotal) {
  const ship=round2(Number(shipTotal)||0),tax=round2(Number(taxTotal)||0);
  const total=items.reduce((s,i)=>s+round2(Number(i.unit_cost||0)*Number(i.qty_purchased||1)),0);
  const rows=items.map(i=>{
    const w=total>0?round2(Number(i.unit_cost||0)*Number(i.qty_purchased||1))/total:1/items.length;
    return{...i,ship_alloc:round2(ship*w),tax_alloc:round2(tax*w)};
  });
  if(rows.length){
    const sd=round2(ship-round2(rows.reduce((s,r)=>s+r.ship_alloc,0)));
    const td=round2(tax-round2(rows.reduce((s,r)=>s+r.tax_alloc,0)));
    rows[rows.length-1].ship_alloc=round2(rows[rows.length-1].ship_alloc+sd);
    rows[rows.length-1].tax_alloc=round2(rows[rows.length-1].tax_alloc+td);
  }
  return rows;
}

// ── Modal ─────────────────────────────────
function Modal({title,onClose,width='900px',headerActions=null,children}){
  return(
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{width}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,gap:12}}>
          <h2 style={{margin:0}}>{title}</h2>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {headerActions}
            <button onClick={onClose} className="ghost" style={{fontSize:20,lineHeight:1}}>✕</button>
          </div>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── Kebab ─────────────────────────────────
function Kebab({items}){
  const [open,setOpen]=useState(false);
  const [menuPos,setMenuPos]=useState({top:0,left:0});
  const ref=useRef();
  const btnRef=useRef();
  const menuRef=useRef();

  useEffect(()=>{
    const h=e=>{
      const clickedTrigger = ref.current && ref.current.contains(e.target);
      const clickedMenu = menuRef.current && menuRef.current.contains(e.target);
      if(!clickedTrigger && !clickedMenu){
        setOpen(false);
      }
    };
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  const toggle=()=>{
    if(!open&&btnRef.current){
      const rect=btnRef.current.getBoundingClientRect();
      const menuW=140;
      const menuH=items.length*38;
      const spaceBelow=window.innerHeight-rect.bottom;
      const top=spaceBelow<menuH ? rect.top-menuH : rect.bottom;
      const left=Math.max(8, rect.right-menuW);
      setMenuPos({top:top+window.scrollY,left:left+window.scrollX});
    }
    setOpen(o=>!o);
  };

  const menu=open&&ReactDOM.createPortal(
    <div
      ref={menuRef}
      style={{
        position:'absolute',
        top:menuPos.top,
        left:menuPos.left,
        background:'var(--card)',
        border:'1px solid var(--border)',
        borderRadius:'var(--radius)',
        minWidth:140,
        zIndex:1000
      }}
    >
      {items.map((item,i)=>(
        <button
          key={i}
          type="button"
          style={{
            display:'block',
            width:'100%',
            textAlign:'left',
            background:'none',
            border:'none',
            borderRadius:0,
            padding:'8px 14px',
            fontSize:13,
            cursor:'pointer',
            color:item.danger?'var(--danger)':'var(--text)'
          }}
          onClick={()=>{
            setOpen(false);
            item.action();
          }}
          onMouseEnter={e=>e.currentTarget.style.background='var(--border)'}
          onMouseLeave={e=>e.currentTarget.style.background='none'}
        >
          {item.label}
        </button>
      ))}
    </div>,
    document.body
  );

  return(
    <div className="kebab-wrap" ref={ref}>
      <button type="button" className="kebab-btn" ref={btnRef} onClick={toggle}>⋮</button>
      {menu}
    </div>
  );
}

// ── Sorting hook + SortTh component ──────
function useSort(defaultKey, defaultDir = 'asc') {
  const [sortKey, setSortKey] = useState(defaultKey);
  const [sortDir, setSortDir] = useState(defaultDir);

  const toggle = key => {
    if (key === sortKey) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  };

  const NUMERIC_KEYS = new Set([
    'item_count','parts_total','shipping_total','tax_total','order_total',
    'qty_purchased','unit_cost','shipping_allocated','tax_allocated','total_line_cost',
    'qty_on_hand','low_stock_threshold'
  ]);

  const sort = (arr, getValue) => [...arr].sort((a, b) => {
    const av = getValue ? getValue(a, sortKey) : a[sortKey];
    const bv = getValue ? getValue(b, sortKey) : b[sortKey];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    const isNum = NUMERIC_KEYS.has(sortKey);
    const cmp = isNum
      ? Number(av) - Number(bv)
      : String(av).localeCompare(String(bv), undefined, { sensitivity: 'base' });
    return sortDir === 'asc' ? cmp : -cmp;
  });

  return { sortKey, sortDir, toggle, sort };
}

function SortTh({ label, colKey, sortKey, sortDir, onToggle, style }) {
  const active = colKey === sortKey;
  return (
    <th onClick={() => onToggle(colKey)}
      style={{ cursor: 'pointer', userSelect: 'none', whiteSpace: 'nowrap', ...style }}>
      {label}
      <span style={{ marginLeft: 4, opacity: active ? 1 : 0.25, fontSize: 10 }}>
        {active ? (sortDir === 'asc' ? '▲' : '▼') : '▲'}
      </span>
    </th>
  );
}

// ── ItemForm (used inside NewOrderModal) ──
function ItemForm({ initial = {}, onSave, onClose, stockItems = [], onStockCreated }) {
  const [f, setF] = useState({
	  item_name: '', variant: '', category: '', qty_purchased: 1,
	  unit_cost: '', condition: 'New', notes: '', stock_item_id: '',
	  is_digital: false,
	  update_unit_cost: !initial.item_id,  // true for new, false for edit
	  ...initial
	});
  const [showNewStock, setShowNewStock] = useState(false);
  const [newStock, setNewStock] = useState({ name: '', variant: '', category: '', sku_prefix: '', location: '', notes: '' });
  const [creatingStock, setCreatingStock] = useState(false);

  const handle = e => setF(p => ({ ...p, [e.target.name]: e.target.value }));
  const handleNewStock = e => setNewStock(p => ({ ...p, [e.target.name]: e.target.value }));

  useEffect(() => {
    setNewStock(p => ({
      ...p,
      name: f.item_name,
      category: f.category,
      sku_prefix: f.item_name ? f.item_name.slice(0, 2).toUpperCase() : ''
    }));
  }, [f.item_name, f.category]);

  const toggleDigital = e => {
    const digital = e.target.checked;
    setF(p => ({ ...p, is_digital: digital, stock_item_id: digital ? '' : p.stock_item_id }));
    if (digital) setShowNewStock(false);
  };

  const createStockItem = async () => {
    if (!newStock.name) return;
    const prefix = (newStock.sku_prefix || '').toUpperCase();
    if (!prefix) { alert('SKU prefix is required.'); return; }
    const taken = stockItems.some(s => s.sku && s.sku.startsWith(prefix + '-'));
    if (taken) { alert(`Prefix "${prefix}" is already in use. Choose a different one.`); return; }
    setCreatingStock(true);
    try {
      const created = await api('/api/stock', { method: 'POST', body: { ...newStock, sku_prefix: prefix } });
      await onStockCreated();
      setF(p => ({ ...p, stock_item_id: String(created.id) }));
      setShowNewStock(false);
      setNewStock({ name: '', variant: '', category: '', sku_prefix: '', location: '', notes: '' });
    } catch (e) {
      alert('Failed to create stock item: ' + e.message);
    }
    setCreatingStock(false);
  };

  const canSave = f.item_name && (f.is_digital || f.stock_item_id);

  return (
    <form onSubmit={e => { e.preventDefault(); if (canSave) onSave(f); }}
      style={{ background: 'var(--card)', borderRadius: 'var(--radius)', padding: 14, marginBottom: 14 }}>
      <div className="form-grid">
        <div className="form-group full"><label>Item Name *</label><input name="item_name" value={f.item_name} onChange={handle} required /></div>
        <div className="form-group"><label>Category</label><CategoryCombobox value={f.category} onChange={handle} /></div>
        <div className="form-group"><label>Variant</label><input name="variant" value={f.variant || ''} onChange={handle} /></div>
        <div className="form-group"><label>Condition</label><select name="condition" value={f.condition || 'New'} onChange={handle}>{CONDITIONS.map(c => <option key={c}>{c}</option>)}</select></div>
        <div className="form-group"><label>Qty</label><input type="number" name="qty_purchased" value={f.qty_purchased} onChange={handle} min="1" /></div>
        <div className="form-group full" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
		  <input type="checkbox" id="update_unit_cost_item"
			checked={!!f.update_unit_cost}
			onChange={e => setF(p => ({ ...p, update_unit_cost: e.target.checked }))}
			style={{ width: 'auto', margin: 0 }} />
		  <label htmlFor="update_unit_cost_item" style={{ margin: 0, cursor: 'pointer', fontSize: 13 }}>
			Update stock replacement cost from this purchase
		  </label>
		</div>

        {/* Digital asset toggle */}
        <div className="form-group full" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <input type="checkbox" id="is_digital_item" checked={!!f.is_digital} onChange={toggleDigital} style={{ width: 'auto', margin: 0 }} />
          <label htmlFor="is_digital_item" style={{ margin: 0, cursor: 'pointer' }}>Digital asset</label>
        </div>

        {!f.is_digital && (
          <div className="form-group full">
            <label>Stock Item *</label>
            <div style={{ display: 'flex', gap: 8 }}>
              <select name="stock_item_id" value={f.stock_item_id} onChange={handle} style={{ flex: 1 }}>
                <option value="">— select or create —</option>
                {stockItems.map(s => (
                  <option key={s.id} value={s.id} style={!s.active ? { color: 'var(--muted)' } : {}}>
                    {s.sku} — {s.name}{s.variant ? ` (${s.variant})` : ''}{!s.active ? ' [Retired]' : ''}
                  </option>
                ))}
              </select>
              <button type="button" className="sm" onClick={() => setShowNewStock(p => !p)}>
                {showNewStock ? 'Cancel' : '+ New'}
              </button>
            </div>
          </div>
        )}

        <div className="form-group full"><label>Notes</label><input name="notes" value={f.notes || ''} onChange={handle} /></div>
      </div>

      {!f.is_digital && showNewStock && (
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 12, marginTop: 10 }}>
          <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.05em' }}>New Stock Item</div>
          <div className="form-grid">
            <div className="form-group full"><label>Name *</label><input name="name" value={newStock.name} onChange={handleNewStock} required /></div>
            <div className="form-group"><label>Category</label><CategoryCombobox value={newStock.category} onChange={handleNewStock} /></div>
            <div className="form-group"><label>SKU Prefix</label><input name="sku_prefix" value={newStock.sku_prefix || ''} onChange={handleNewStock} placeholder="e.g. EL, PT" maxLength={4} style={{ textTransform: 'uppercase' }} /></div>
            <div className="form-group"><label>Variant</label><input name="variant" value={newStock.variant} onChange={handleNewStock} /></div>
            <div className="form-group"><label>Location</label><input name="location" value={newStock.location} onChange={handleNewStock} /></div>
            <div className="form-group full"><label>Notes</label><input name="notes" value={newStock.notes} onChange={handleNewStock} /></div>
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
            <button type="button" className="primary sm" onClick={createStockItem} disabled={!newStock.name || creatingStock}>
              {creatingStock ? 'Creating…' : 'Create Stock Item'}
            </button>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
        <button type="submit" className="primary sm" disabled={!canSave}>Save</button>
        <button type="button" className="sm" onClick={onClose}>Cancel</button>
      </div>
    </form>
  );
}

// ── LineItemsTable ────────────────────────
function LineItemsTable({rows,shipTarget,taxTarget,onAllocChange,onDelete,onEdit,onSaveAlloc,onRedistribute,saving}){
  const shipSum=round2(rows.reduce((s,r)=>s+Number(r.ship_alloc||0),0));
  const taxSum =round2(rows.reduce((s,r)=>s+Number(r.tax_alloc||0),0));
  const hasAlloc=(shipTarget>0||taxTarget>0);
  const balanced=(!hasAlloc)||(shipSum===shipTarget&&taxSum===taxTarget);
  return(
    <div>
      <div className="overflow-x">
        <table>
          <thead><tr>
            {rows[0]?.item_id&&<th>ID</th>}
            <th>Name</th><th>Category</th><th>Qty</th><th>Unit Cost</th>
            {hasAlloc&&<><th>Ship Alloc</th><th>Tax Alloc</th></>}
            <th>Line Total</th>
            <th></th>
          </tr></thead>
          <tbody>
            {rows.map((r,i)=>{
              const lineTotal=round2(Number(r.unit_cost||0)*Number(r.qty_purchased||1)+Number(r.ship_alloc||0)+Number(r.tax_alloc||0));
              return(
                <tr key={r.item_id||r._key||i}>
                  {rows[0]?.item_id!==undefined&&<td style={{fontFamily:'monospace',fontSize:11,color:r.item_id?'inherit':'var(--muted)'}}>{r.item_id||'—'}</td>}
                  <td><div style={{fontWeight:500}}>{r.item_name}</div>{r.variant&&<div style={{fontSize:11,color:'var(--muted)'}}>{r.variant}</div>}</td>
                  <td>{catBadge(r.category)}</td>
                  <td>{r.qty_purchased}</td>
                  <td>{fmt$(r.unit_cost)}</td>
                  {hasAlloc&&<>
                    <td><input className="alloc-input" type="number" value={r.ship_alloc??0} step="0.01" onChange={e=>onAllocChange(i,'ship_alloc',round2(parseFloat(e.target.value)||0))}/></td>
                    <td><input className="alloc-input" type="number" value={r.tax_alloc??0} step="0.01" onChange={e=>onAllocChange(i,'tax_alloc',round2(parseFloat(e.target.value)||0))}/></td>
                  </>}
                  <td style={{fontWeight:500}}>{fmt$(lineTotal)}</td>
                  <td>
                    <Kebab items={[
                      ...(onEdit?[{label:'Edit',action:()=>onEdit(r,i)}]:[]),
                      ...(onDelete?[{label:'Delete',danger:true,action:()=>onDelete(r)}]:[]),
                    ]}/>
                  </td>
                </tr>
              );
            })}
          </tbody>
          {hasAlloc&&rows.length>0&&(
            <tfoot><tr>
              {rows[0]?.item_id&&<td/>}
              <td colSpan={4} style={{color:'var(--muted)',fontSize:12}}>Totals</td>
              <td><span className={shipSum===shipTarget?'alloc-match':'alloc-nomatch'}>{fmt$(shipSum)}<span style={{color:'var(--muted)',fontWeight:400}}> / {fmt$(shipTarget)}</span></span></td>
              <td><span className={taxSum===taxTarget?'alloc-match':'alloc-nomatch'}>{fmt$(taxSum)}<span style={{color:'var(--muted)',fontWeight:400}}> / {fmt$(taxTarget)}</span></span></td>
              <td/><td/>
            </tr></tfoot>
          )}
        </table>
      </div>
      {hasAlloc&&(
        <div style={{display:'flex',gap:8,alignItems:'center',marginTop:10,justifyContent:'flex-end'}}>
          <button className="sm" onClick={onRedistribute}>Redistribute</button>
          {onSaveAlloc&&<button className="primary sm" onClick={onSaveAlloc} disabled={!balanced||saving}>{saving?'Saving…':'Save Allocation'}</button>}
          <span className={balanced?'alloc-match':'alloc-nomatch'} style={{fontSize:12}}>{balanced?'✓ Balanced':'✗ Unbalanced'}</span>
        </div>
      )}
    </div>
  );
}

// ── OrderHeaderForm component ───────────────────────
function OrderHeaderForm({initial={},onSave,onClose,title='Edit Order'}){
  const [f,setF]=useState({order_number:'',vendor:'',order_date:'',shipping_total:'',tax_total:'',notes:'',...initial});
  const [saving,setSaving]=useState(false);
  const handle=e=>setF(p=>({...p,[e.target.name]:e.target.value}));
  const save=async e=>{
    e.preventDefault();setSaving(true);

    <Modal title={title} onClose={onClose} width="560px">
      <form onSubmit={save}>
        <div className="form-grid">
          <div className="form-group"><label>Order # *</label><input name="order_number" value={f.order_number} onChange={handle} required/></div>
          <div className="form-group"><label>Vendor</label><input name="vendor" value={f.vendor||''} onChange={handle}/></div>
          <div className="form-group"><label>Order Date</label><input type="date" name="order_date" value={f.order_date?fmtDate(f.order_date):''} onChange={handle}/></div>
          <div className="form-group"><label>Shipping Total</label><input type="number" name="shipping_total" value={f.shipping_total||''} onChange={handle} step="0.01" min="0"/></div>
          <div className="form-group"><label>Tax Total</label><input type="number" name="tax_total" value={f.tax_total||''} onChange={handle} step="0.01" min="0"/></div>
          <div className="form-group full"><label>Notes</label><input name="notes" value={f.notes||''} onChange={handle}/></div>
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
          <button type="button" onClick={onClose}>Cancel</button>
          <button type="submit" className="primary" disabled={saving}>{saving?'Saving…':'Save Order'}</button>
        </div>
      </form>
    </Modal>
  );
}

// ── New Order Modal ───────────────────────
function NewOrderModal({onClose,onSaved,editOrder}){
  const isEdit = !!editOrder;
  const [pasteHeader, setPasteHeader] = useState(false);
  const [pasteText, setPasteText] = useState('');
  const [header, setHeader] = useState(isEdit
    ? { order_number: editOrder.order_number, vendor: editOrder.vendor || '', order_date: editOrder.order_date ? fmtDate(editOrder.order_date) : '', shipping_total: editOrder.shipping_total || '', tax_total: editOrder.tax_total || '', notes: editOrder.notes || '' }
    : { order_number: '', vendor: '', order_date: '', shipping_total: '', tax_total: '', notes: '' });
  const [rows, setRows] = useState([]);
  const [originalItemIds, setOriginalItemIds] = useState([]);
  const [showAdd, setShowAdd] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [pasteItems, setPasteItems] = useState(false);
  const [pasteItemText, setPasteItemText] = useState('');
  const [preview, setPreview] = useState(null);
  const [saving, setSaving] = useState(false);
  const [loading, setLoading] = useState(isEdit);
  const [err, setErr] = useState('');
  const [categories, setCategories] = useState([]);
  const [stockItems, setStockItems] = useState([]);

  useEffect(() => {
    // Load distinct categories for combobox
    api('/api/purchased-items').then(items => {
      const cats = [...new Set(items.map(i => i.category).filter(Boolean))].sort();
      setCategories(cats);
    });
	api('/api/stock?active=all').then(setStockItems);
    if (!isEdit) return;
    api(`/api/orders?order_number=${encodeURIComponent(editOrder.order_number)}`).then(items => {
      const mapped = items.map(i => ({
        ...i,
        ship_alloc: Number(i.shipping_allocated || 0),
        tax_alloc: Number(i.tax_allocated || 0),
      }));
      setRows(mapped);
      setOriginalItemIds(items.map(i => i.item_id));
      setLoading(false);
    });
  }, []);

  const shipTarget=round2(Number(header.shipping_total)||0);
  const taxTarget =round2(Number(header.tax_total)||0);
  const hasAlloc=shipTarget>0||taxTarget>0;
  const shipSum=round2(rows.reduce((s,r)=>s+Number(r.ship_alloc||0),0));
  const taxSum =round2(rows.reduce((s,r)=>s+Number(r.tax_alloc||0),0));
  const balanced=(!hasAlloc)||(shipSum===shipTarget&&taxSum===taxTarget);
  const canSave=header.order_number&&rows.length>0&&balanced;

  const handleHeader=e=>setHeader(p=>({...p,[e.target.name]:e.target.value}));
  const handleShipTax=e=>{
    const upd={...header,[e.target.name]:e.target.value};
    setHeader(upd);setRows(r=>distribute(r,upd.shipping_total,upd.tax_total));
  };

  const parseHeaderPaste=()=>{
    const r=parseCSVText(pasteText)[0];if(!r)return;
    const upd={...header,
      order_number:r.order_number||header.order_number,
      vendor:r.vendor||header.vendor,
      order_date:r.order_date||header.order_date,
      shipping_total:r.shipping_total||header.shipping_total,
      tax_total:r.tax_total||header.tax_total,
    };
    setHeader(upd);setRows(rv=>distribute(rv,upd.shipping_total,upd.tax_total));
    setPasteHeader(false);setPasteText('');
  };

  const addItem=f=>{
    const item={...f,qty_purchased:parseInt(f.qty_purchased)||1,unit_cost:parseFloat(f.unit_cost)||0,ship_alloc:0,tax_alloc:0,_key:Date.now()};
    setRows(distribute([...rows,item],header.shipping_total,header.tax_total));
    setShowAdd(false);
  };

  const editItem=(f,idx)=>{
    const updated=rows.map((r,i)=>i===idx?{...r,...f,qty_purchased:parseInt(f.qty_purchased)||1,unit_cost:parseFloat(f.unit_cost)||0}:r);
    setRows(distribute(updated,header.shipping_total,header.tax_total));
    setEditIdx(null);
  };

  const removeItem=row=>setRows(distribute(
    rows.filter(x=>(x._key||x.item_id)!==(row._key||row.item_id)),
    header.shipping_total,header.tax_total
  ));

const parsePasteItems = () => {
  setPreview(parseCSVText(pasteItemText).map((r, i) => ({
    item_name: r.item_name || '?', variant: r.variant || '',
    category: r.category || '',
    qty_purchased: parseInt(r.qty_purchased) || 1, unit_cost: parseFloat(r.unit_cost) || 0,
    condition: r.condition || 'New', notes: r.notes || '', ship_alloc: 0, tax_alloc: 0, _key: Date.now() + i,
  })));
};

  const confirmPaste=()=>{
    setRows(distribute([...rows,...preview],header.shipping_total,header.tax_total));
    setPreview(null);setPasteItemText('');setPasteItems(false);
  };

  const allocChange=(i,field,val)=>setRows(r=>r.map((x,j)=>j===i?{...x,[field]:val}:x));
  
  const refreshStockItems = async () => {
	  const items = await api('/api/stock?active=all');
	  setStockItems(items);
	  return items;
	};

  const save=async()=>{
    if(!canSave)return;
    setSaving(true);setErr('');
    try{
      // Upsert order header
      await api('/api/orders',{method:'POST',body:{
        order_number:header.order_number,
        vendor:header.vendor||null,
        order_date:header.order_date||null,
        shipping_total:shipTarget,
        tax_total:taxTarget,
        notes:header.notes||null,
      }});

      if(isEdit){
        // Diff: delete removed items
        const currentIds=rows.filter(r=>r.item_id).map(r=>r.item_id);
        const toDelete=originalItemIds.filter(id=>!currentIds.includes(id));
        for(const id of toDelete){
          await api(`/api/purchased-items/${id}`,{method:'DELETE'});
        }
        // Update existing, insert new
        for(const row of rows){
          if(row.item_id){
            // Existing item — update
            await api(`/api/purchased-items/${row.item_id}`,{method:'PUT',body:{
              item_name:row.item_name,variant:row.variant||null,category:row.category||null,
			  stock_item_id:row.stock_item_id?parseInt(row.stock_item_id):null,
              vendor:header.vendor||null,date_purchased:header.order_date||null,
              qty_purchased:row.qty_purchased,
              unit_cost:row.unit_cost,condition:row.condition||'New',
              category:row.category,location:row.location||null,notes:row.notes||null,
            }});
            // Save allocation separately
            await api(`/api/purchased-items/${row.item_id}`,{method:'PUT',body:{
              _partial:true,
              shipping_allocated:row.ship_alloc||0,
              tax_allocated:row.tax_alloc||0,
            }});
          } else {
            // New item — insert
            await api('/api/purchased-items',{method:'POST',body:{
              order_number:header.order_number,
              item_name:row.item_name,variant:row.variant||null,category:row.category||null,
			  stock_item_id:row.stock_item_id?parseInt(row.stock_item_id):null,
              vendor:header.vendor||null,date_purchased:header.order_date||null,
              qty_purchased:row.qty_purchased,unit_cost:row.unit_cost,
              condition:row.condition||'New',category:row.category,
              notes:row.notes||null,
              shipping_allocated:row.ship_alloc||0,
              tax_allocated:row.tax_alloc||0,
            }});
          }
        }
      } else {
        // New order — insert all items
        for(const row of rows){
          await api('/api/purchased-items',{method:'POST',body:{
            order_number:header.order_number,
            item_name:row.item_name,variant:row.variant||null,category:row.category||null,
			stock_item_id:row.stock_item_id?parseInt(row.stock_item_id):null,
            vendor:header.vendor||null,date_purchased:header.order_date||null,
            qty_purchased:row.qty_purchased,unit_cost:row.unit_cost,
            condition:row.condition||'New',category:row.category,
            notes:row.notes||null,
            shipping_allocated:row.ship_alloc||0,
            tax_allocated:row.tax_alloc||0,
          }});
        }
      }
      onSaved();
    }catch(e){setErr(e.message);}
    setSaving(false);
  };

  return(
    <Modal title={isEdit?`Edit Order ${header.order_number}`:'New Order'} onClose={onClose} width="860px">
      <div className="section">
        <div className="section-header">
          <h3>Order Header</h3>
          {!isEdit&&<button className="toggle-link" onClick={()=>setPasteHeader(p=>!p)}>{pasteHeader?'Enter manually':'Paste instead'}</button>}
        </div>
        {pasteHeader&&!isEdit?(
          <div>
            <p style={{fontSize:12,color:'var(--muted)',marginBottom:8}}>Paste order footer CSV:<br/><code style={{fontSize:11}}>order_number,vendor,order_date,shipping_total,tax_total</code></p>
            <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={3} style={{fontFamily:'monospace',fontSize:12,marginBottom:8}}/>
            <div style={{display:'flex',gap:8}}>
              <button className="primary sm" onClick={parseHeaderPaste} disabled={!pasteText.trim()}>Parse & Fill</button>
              <button className="sm" onClick={()=>{setPasteHeader(false);setPasteText('');}}>Cancel</button>
            </div>
          </div>
        ):(
          <div className="form-grid">
            <div className="form-group"><label>Order # *</label><input name="order_number" value={header.order_number} onChange={handleHeader} readOnly={isEdit} style={isEdit?{opacity:.6}:{}}/></div>
            <div className="form-group"><label>Vendor</label><input name="vendor" value={header.vendor} onChange={handleHeader}/></div>
            <div className="form-group"><label>Order Date</label><input type="date" name="order_date" value={header.order_date} onChange={handleHeader}/></div>
            <div className="form-group"><label>Shipping Total</label><input type="number" name="shipping_total" value={header.shipping_total} onChange={handleShipTax} step="0.01" min="0"/></div>
            <div className="form-group"><label>Tax Total</label><input type="number" name="tax_total" value={header.tax_total} onChange={handleShipTax} step="0.01" min="0"/></div>
            <div className="form-group full"><label>Notes</label><input name="notes" value={header.notes} onChange={handleHeader}/></div>
          </div>
        )}
      </div>

      <div className="section">
        <div className="section-header">
          <h3>Line Items ({rows.length})</h3>
          <div style={{display:'flex',gap:8}}>
            {hasAlloc&&rows.length>0&&<button className="sm" onClick={()=>setRows(distribute(rows,header.shipping_total,header.tax_total))}>Redistribute</button>}
            <button className="sm" onClick={()=>{setShowAdd(a=>!a);setPasteItems(false);setEditIdx(null);}}>+ Add Item</button>
            <button className="sm" onClick={()=>{setPasteItems(p=>!p);setShowAdd(false);setPreview(null);setEditIdx(null);}}>Paste Items</button>
          </div>
        </div>

		{showAdd && <ItemForm
		  onSave={addItem}
		  onClose={() => setShowAdd(false)}
		  stockItems={stockItems}
		  onStockCreated={refreshStockItems}
		/>}
		{editIdx !== null && <ItemForm
		  initial={rows[editIdx]}
		  onSave={f => editItem(f, editIdx)}
		  onClose={() => setEditIdx(null)}
		  stockItems={stockItems}
		  onStockCreated={refreshStockItems}
		/>}

        {pasteItems&&!preview&&(
          <div style={{background:'var(--card)',borderRadius:'var(--radius)',padding:14,marginBottom:14}}>
            <textarea value={pasteItemText} onChange={e=>setPasteItemText(e.target.value)} rows={7}
              style={{fontFamily:'monospace',fontSize:12,marginBottom:8}}
              placeholder="item_name,variant,vendor,order_number,date_purchased,qty_purchased,unit_cost,category,condition,notes"/>
            <div style={{display:'flex',gap:8}}>
              <button className="primary sm" onClick={parsePasteItems} disabled={!pasteItemText.trim()}>Preview</button>
              <button className="sm" onClick={()=>{setPasteItems(false);setPasteItemText('');}}>Cancel</button>
            </div>
          </div>
        )}

        {preview&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:8}}>{preview.length} items — confirm to add:</div>
            <div className="overflow-x" style={{marginBottom:10}}>
              <table><thead><tr><th>Name</th><th>Category</th><th>Qty</th><th>Unit Cost</th><th>Variant</th></tr></thead>
                <tbody>{preview.map((r,i)=><tr key={i}><td>{r.item_name}</td><td>{catBadge(r.category)}</td><td>{r.qty_purchased}</td><td>{fmt$(r.unit_cost)}</td><td style={{fontSize:12,color:'var(--muted)'}}>{r.variant||'—'}</td></tr>)}</tbody>
              </table>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="primary sm" onClick={confirmPaste}>Confirm & Distribute</button>
              <button className="sm" onClick={()=>{setPreview(null);setPasteItemText('');}}>Back</button>
            </div>
          </div>
        )}

        {loading
          ? <div style={{display:'flex',alignItems:'center',gap:10,padding:24,color:'var(--muted)',fontSize:13}}>
              <div style={{width:18,height:18,border:'2px solid var(--border)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
              <span>Loading items…</span>
            </div>
          : rows.length===0
            ? <div className="empty" style={{padding:20}}>No items yet.</div>
            : <LineItemsTable rows={rows} shipTarget={shipTarget} taxTarget={taxTarget}
                onAllocChange={allocChange} onDelete={removeItem}
                onEdit={(_,idx)=>{setEditIdx(idx);setShowAdd(false);setPasteItems(false);}}
                onRedistribute={()=>setRows(distribute(rows,header.shipping_total,header.tax_total))}/>
        }
      </div>

      {err&&<div className="result-err" style={{marginBottom:12}}>{err}</div>}
      {!balanced&&hasAlloc&&<div style={{background:'#2a1a00',border:'1px solid var(--warn)',borderRadius:'var(--radius)',padding:'8px 14px',color:'var(--warn)',fontSize:12,marginBottom:12}}>Allocations must balance before saving.</div>}
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
        <button onClick={onClose}>Cancel</button>
        <button className="primary" onClick={save} disabled={!canSave||saving}>
          {saving?'Saving…':isEdit?'Save Changes':`Save Order (${rows.length} item${rows.length!==1?'s':''})`}
        </button>
      </div>
    </Modal>
  );
}

// ── Order Detail Modal ────────────────────
function OrderDetailModal({order,onClose,onEdit,onDelete}){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);

  const loadItems=async()=>{
    setLoading(true);
    setItems(await api(`/api/orders?order_number=${encodeURIComponent(order.order_number)}`));
    setLoading(false);
  };
  useEffect(()=>{loadItems();},[order.order_number]);

  const shipTarget=round2(Number(order.shipping_total)||0);
  const taxTarget =round2(Number(order.tax_total)||0);
  const hasAlloc=shipTarget>0||taxTarget>0;
  const subtotal=items.reduce((s,i)=>s+Number(i.total_line_cost||0),0);

  return(
		<Modal
		  title={`Order ${order.order_number}`}
		  onClose={onClose}
		  headerActions={
			<Kebab items={[
			  {label:'Edit Order', action:()=>{onClose();onEdit(order);}},
			  {label:'Delete Order', danger:true, action:()=>{onClose();onDelete(order);}},
			]}/>
		  }
		>
		  {/* Summary bar */}
		  <div style={{display:'flex',gap:16,fontSize:13,marginBottom:14,flexWrap:'wrap',padding:'10px 14px',background:'var(--surface)',borderRadius:'var(--radius)',alignItems:'center'}}>
			<span><span style={{color:'var(--muted)'}}>Vendor:</span> <strong>{order.vendor||'—'}</strong></span>
			<span><span style={{color:'var(--muted)'}}>Date:</span> <strong>{fmtDate(order.order_date)}</strong></span>
			<span><span style={{color:'var(--muted)'}}>Shipping:</span> <strong>{fmt$(order.shipping_total)}</strong></span>
			<span><span style={{color:'var(--muted)'}}>Tax:</span> <strong>{fmt$(order.tax_total)}</strong></span>
			<span><span style={{color:'var(--muted)'}}>Total:</span> <strong style={{color:'var(--accent2)'}}>{fmt$(subtotal)}</strong></span>
		  </div>

      <div className="section">
        <div className="section-header">
          <h3>Line Items ({items.length})</h3>
        </div>
        {loading
          ? <div style={{display:'flex',alignItems:'center',gap:10,padding:24,color:'var(--muted)',fontSize:13}}>
              <div style={{width:18,height:18,border:'2px solid var(--border)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>
              <span>Loading items…</span>
            </div>
          : items.length===0
            ? <div className="empty">No items on this order.</div>
            : <div className="overflow-x">
                <table>
                  <thead><tr>
                    <th>ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Unit Cost</th>
                    {hasAlloc&&<><th>Ship Alloc</th><th>Tax Alloc</th></>}
                    <th>Line Total</th>
                  </tr></thead>
                  <tbody>
                    {items.map(r=>{
                      const lt=round2(Number(r.unit_cost||0)*Number(r.qty_purchased||1)+Number(r.shipping_allocated||0)+Number(r.tax_allocated||0));
                      return(
                        <tr key={r.item_id}>
                          <td style={{fontFamily:'monospace',fontSize:11}}>{r.item_id}</td>
                          <td><div style={{fontWeight:500}}>{r.item_name}</div>{r.variant&&<div style={{fontSize:11,color:'var(--muted)'}}>{r.variant}</div>}</td>
                          <td>{catBadge(r.category)}</td>
                          <td>{r.qty_purchased}</td>
                          <td>{fmt$(r.unit_cost)}</td>
                          {hasAlloc&&<><td style={{fontSize:12}}>{fmt$(r.shipping_allocated)}</td><td style={{fontSize:12}}>{fmt$(r.tax_allocated)}</td></>}
                          <td style={{fontWeight:500}}>{fmt$(lt)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
        }
      </div>
    </Modal>
  );
}

// ── Orders Tab ────────────────────────────
function OrdersTab(){
  const [orders,setOrders]=useState([]);
  const [loading,setLoading]=useState(true);
  const [detail,setDetail]=useState(null);
  const [editOrder,setEditOrder]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [search,setSearch]=useState('');
  const [filterVendor,setFilterVendor]=useState('');
  const [filterDateFrom,setFilterDateFrom]=useState('');
  const [filterDateTo,setFilterDateTo]=useState('');
  const { sortKey: oSortKey, sortDir: oSortDir, toggle: oToggle, sort: oSort } = useSort('order_date', 'desc');

  const load=useCallback(async()=>{setLoading(true);setOrders(await api('/api/orders'));setLoading(false);},[]);
  useEffect(()=>{let ignore=false;(async()=>{setLoading(true);const d=await api('/api/orders');if(!ignore)setOrders(d);setLoading(false);})();return()=>{ignore=true;};},[]);

  const vendors=useMemo(()=>[...new Set(orders.map(o=>o.vendor).filter(Boolean))].sort(),[orders]);

  const filtered = useMemo(() => {
    const f = orders.filter(o => {
      if (search && !o.order_number.toLowerCase().includes(search.toLowerCase()) && !(o.vendor||'').toLowerCase().includes(search.toLowerCase())) return false;
      if (filterVendor && o.vendor !== filterVendor) return false;
      if (filterDateFrom && fmtDate(o.order_date) < filterDateFrom) return false;
      if (filterDateTo && fmtDate(o.order_date) > filterDateTo) return false;
      return true;
    });
    return oSort(f);
  }, [orders, search, filterVendor, filterDateFrom, filterDateTo, oSortKey, oSortDir]);

	const del = async o => {
	  const itemCount = Number(o.item_count || 0);
	  const itemLabel = itemCount === 1 ? '1 purchased item' : `${itemCount} purchased items`;
	  if (!confirm(`Delete order ${o.order_number}? This will also delete ${itemLabel} and cannot be undone.`)) return;
	  await api(`/api/orders?order_number=${encodeURIComponent(o.order_number)}`, { method: 'DELETE' });
	  setDetail(null);
	  load();
	};

  const totalCost = orders.reduce((s,o) => s + Number(o.order_total || 0), 0);
  const totalShip = orders.reduce((s,o) => s + Number(o.shipping_total || 0), 0);
  const totalTax  = orders.reduce((s,o) => s + Number(o.tax_total || 0), 0);
  const avgCost   = orders.length ? totalCost / orders.length : 0;

  return(
    <>
      <div className="stats-row">
		<div className="stat"><div className="stat-label">Orders</div><div className="stat-value">{orders.length}</div></div>
		<div className="stat"><div className="stat-label">Avg Order</div><div className="stat-value">{fmt$(avgCost)}</div></div>
		<div className="stat"><div className="stat-label">Shipping</div><div className="stat-value">{fmt$(totalShip)}</div></div>
		<div className="stat"><div className="stat-label">Tax</div><div className="stat-value">{fmt$(totalTax)}</div></div>
		<div className="stat"><div className="stat-label">Total Cost</div><div className="stat-value">{fmt$(totalCost)}</div></div>
	  </div>

      <div className="filter-bar">
        <div className="filter-group"><label>Search</label><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Order # or vendor" style={{width:160}}/></div>
        <div className="filter-group"><label>Vendor</label>
          <select value={filterVendor} onChange={e=>setFilterVendor(e.target.value)} style={{width:140}}>
            <option value="">All</option>{vendors.map(v=><option key={v}>{v}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>From</label><input type="date" value={filterDateFrom} onChange={e=>setFilterDateFrom(e.target.value)} style={{width:140}}/></div>
        <div className="filter-group"><label>To</label><input type="date" value={filterDateTo} onChange={e=>setFilterDateTo(e.target.value)} style={{width:140}}/></div>
        {(search||filterVendor||filterDateFrom||filterDateTo)&&<button className="sm ghost" onClick={()=>{setSearch('');setFilterVendor('');setFilterDateFrom('');setFilterDateTo('');}}>Clear</button>}
        <button className="primary" style={{marginLeft:'auto'}} onClick={()=>setShowNew(true)}>+ New Order</button>
      </div>

      <div className="overflow-x">
        {loading?<div className="empty">Loading…</div>:filtered.length===0?<div className="empty">No orders match filters.</div>:(
          <table>
            <thead><tr>
				<SortTh label="Order #"  colKey="order_number"  sortKey={oSortKey} sortDir={oSortDir} onToggle={oToggle}/>
				<SortTh label="Vendor"   colKey="vendor"        sortKey={oSortKey} sortDir={oSortDir} onToggle={oToggle}/>
				<SortTh label="Date"     colKey="order_date"    sortKey={oSortKey} sortDir={oSortDir} onToggle={oToggle}/>
				<SortTh label="Items"    colKey="item_count"    sortKey={oSortKey} sortDir={oSortDir} onToggle={oToggle}/>
				<SortTh label="Cost"    colKey="parts_total"   sortKey={oSortKey} sortDir={oSortDir} onToggle={oToggle}/>
				<SortTh label="Shipping" colKey="shipping_total" sortKey={oSortKey} sortDir={oSortDir} onToggle={oToggle}/>
				<SortTh label="Tax"      colKey="tax_total"     sortKey={oSortKey} sortDir={oSortDir} onToggle={oToggle}/>
				<SortTh label="Total"    colKey="order_total"   sortKey={oSortKey} sortDir={oSortDir} onToggle={oToggle}/>
				<th></th>
			</tr></thead>
            <tbody>
              {filtered.map(o=>(
                <tr key={o.id}>
                  <td><span className="order-link" onClick={()=>setDetail(o)}>{o.order_number}</span></td>
                  <td>{o.vendor||'—'}</td>
                  <td style={{fontSize:12}}>{fmtDate(o.order_date)}</td>
                  <td style={{textAlign:'center'}}>{o.item_count}</td>
                  <td>{fmt$(o.parts_total)}</td>
                  <td>{fmt$(o.shipping_total)}</td>
                  <td>{fmt$(o.tax_total)}</td>
                  <td style={{fontWeight:500}}>{fmt$(o.order_total)}</td>
                  <td><Kebab items={[{label:'View',action:()=>setDetail(o)},{label:'Edit',action:()=>setEditOrder(o)},{label:'Delete',danger:true,action:()=>del(o)}]}/></td>
				  
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
      {showNew&&<NewOrderModal onClose={()=>setShowNew(false)} onSaved={()=>{setShowNew(false);load();}}/>}
      {detail&&<OrderDetailModal
		  order={detail}
		  onClose={()=>setDetail(null)}
		  onEdit={o=>{setEditOrder(o);}}
		  onDelete={del}
		/>}
	  {editOrder&&<NewOrderModal editOrder={editOrder} onClose={()=>setEditOrder(null)} onSaved={()=>{setEditOrder(null);load();}}/>}
    </>
  );
}

// ── Purchased Items Tab ───────────────────
function PurchasedItemsTab({ onOpenOrder }) {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [filterVendor, setFilterVendor] = useState('');
  const [filterCondition, setFilterCondition] = useState('');
  const [filterDateFrom, setFilterDateFrom] = useState('');
  const [filterDateTo, setFilterDateTo] = useState('');
  const [viewItem, setViewItem] = useState(null);
  const [editItem, setEditItem] = useState(null);
  const { sortKey: pSortKey, sortDir: pSortDir, toggle: pToggle, sort: pSort } = useSort('date_purchased', 'desc');

  const load = useCallback(async () => {
    setLoading(true);
    setItems(await api('/api/purchased-items'));
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const vendors    = useMemo(() => [...new Set(items.map(i => i.vendor).filter(Boolean))].sort(), [items]);
  const categories = useMemo(() => [...new Set(items.map(i => i.category).filter(Boolean))].sort(), [items]);
  const conditions = useMemo(() => [...new Set(items.map(i => i.condition).filter(Boolean))].sort(), [items]);

  const filtered = useMemo(() => {
    const f = items.filter(i => {
      if (search && !i.item_name.toLowerCase().includes(search.toLowerCase()) && !i.item_id.toLowerCase().includes(search.toLowerCase()) && !(i.vendor||'').toLowerCase().includes(search.toLowerCase())) return false;
      if (filterCat && i.category !== filterCat) return false;
      if (filterVendor && i.vendor !== filterVendor) return false;
      if (filterCondition && i.condition !== filterCondition) return false;
      if (filterDateFrom && fmtDate(i.date_purchased) < filterDateFrom) return false;
      if (filterDateTo && fmtDate(i.date_purchased) > filterDateTo) return false;
      return true;
    });
    return pSort(f);
  }, [items, search, filterCat, filterVendor, filterCondition, filterDateFrom, filterDateTo, pSortKey, pSortDir]);

  const saveEdit = async f => {
    await api(`/api/purchased-items/${editItem.item_id}`, { method: 'PUT', body: f });
    setEditItem(null); setViewItem(null); load();
  };

  const del = async item => {
    if (!confirm(`Delete ${item.item_id}?`)) return;
    await api(`/api/purchased-items/${item.item_id}`, { method: 'DELETE' });
    setViewItem(null); load();
  };

  const totalCost = filtered.reduce((s, i) => s + Number(i.total_line_cost || 0), 0);
  const totalShip = filtered.reduce((s, i) => s + Number(i.shipping_allocated || 0), 0);
  const totalTax  = filtered.reduce((s, i) => s + Number(i.tax_allocated || 0), 0);
  const avgCost   = filtered.length ? totalCost / filtered.length : 0;
  const hasFilters = search || filterCat || filterVendor || filterCondition || filterDateFrom || filterDateTo;

  return (
    <>
      <div className="stats-row">
		<div className="stat"><div className="stat-label">Items</div><div className="stat-value">{filtered.length}{hasFilters && items.length !== filtered.length && <span style={{ fontSize: 13, color: 'var(--muted)' }}> / {items.length}</span>}</div></div>
		<div className="stat"><div className="stat-label">Avg Cost</div><div className="stat-value">{fmt$(avgCost)}</div></div>
		<div className="stat"><div className="stat-label">Shipping</div><div className="stat-value">{fmt$(totalShip)}</div></div>
		<div className="stat"><div className="stat-label">Tax</div><div className="stat-value">{fmt$(totalTax)}</div></div>
		<div className="stat"><div className="stat-label">Total Cost</div><div className="stat-value">{fmt$(totalCost)}</div></div>
	  </div>

      <div className="filter-bar">
        <div className="filter-group"><label>Search</label><input value={search} onChange={e => setSearch(e.target.value)} placeholder="Name, ID, vendor" style={{ width: 180 }} /></div>
        <div className="filter-group"><label>Category</label>
          <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{ width: 130 }}>
            <option value="">All</option>{categories.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>Vendor</label>
          <select value={filterVendor} onChange={e => setFilterVendor(e.target.value)} style={{ width: 130 }}>
            <option value="">All</option>{vendors.map(v => <option key={v}>{v}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>Condition</label>
          <select value={filterCondition} onChange={e => setFilterCondition(e.target.value)} style={{ width: 120 }}>
            <option value="">All</option>{conditions.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
        <div className="filter-group"><label>From</label><input type="date" value={filterDateFrom} onChange={e => setFilterDateFrom(e.target.value)} style={{ width: 140 }} /></div>
        <div className="filter-group"><label>To</label><input type="date" value={filterDateTo} onChange={e => setFilterDateTo(e.target.value)} style={{ width: 140 }} /></div>
        {hasFilters && <button className="sm ghost" onClick={() => { setSearch(''); setFilterCat(''); setFilterVendor(''); setFilterCondition(''); setFilterDateFrom(''); setFilterDateTo(''); }}>Clear</button>}
      </div>

      <div className="overflow-x">
        {loading ? <div className="empty">Loading…</div> : filtered.length === 0 ? <div className="empty">No items match filters.</div> : (
          <table>
            <thead><tr>
				<SortTh label="ID"         colKey="item_id"           sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Name"       colKey="item_name"         sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Category"   colKey="category"          sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Vendor"     colKey="vendor"            sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Order #"    colKey="order_number"      sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Date"       colKey="date_purchased"    sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Qty"        colKey="qty_purchased"     sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Unit Cost"  colKey="unit_cost"         sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Ship Alloc" colKey="shipping_allocated" sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Tax Alloc"  colKey="tax_allocated"     sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<SortTh label="Line Total" colKey="total_line_cost"   sortKey={pSortKey} sortDir={pSortDir} onToggle={pToggle}/>
				<th></th>
			</tr></thead>
            <tbody>
              {filtered.map(i => (
                <tr key={i.item_id}>
                  <td style={{ fontFamily: 'monospace', fontSize: 11, cursor: 'pointer', color: 'var(--accent)' }} onClick={() => setViewItem(i)}>{i.item_id}</td>
                  <td><div style={{ fontWeight: 500 }}>{i.item_name}</div>{i.variant && <div style={{ fontSize: 11, color: 'var(--muted)' }}>{i.variant}</div>}</td>
                  <td>{catBadge(i.category)}</td>
                  <td style={{ fontSize: 12 }}>{i.vendor || '—'}</td>
                  <td>{i.order_number ? <span className="order-link" onClick={() => onOpenOrder(i.order_number)}>{i.order_number}</span> : '—'}</td>
                  <td style={{ fontSize: 12 }}>{fmtDate(i.date_purchased)}</td>
                  <td>{i.qty_purchased}</td>
                  <td>{fmt$(i.unit_cost)}</td>
                  <td style={{ fontSize: 12 }}>{fmt$(i.shipping_allocated)}</td>
                  <td style={{ fontSize: 12 }}>{fmt$(i.tax_allocated)}</td>
                  <td style={{ fontWeight: 500 }}>{fmt$(i.total_line_cost)}</td>
                  <td><Kebab items={[
                    { label: 'View', action: () => setViewItem(i) },
                    { label: 'Edit', action: () => { setViewItem(null); setEditItem(i); } },
                    { label: 'Delete', danger: true, action: () => del(i) }
                  ]} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      {viewItem && !editItem && (
        <Modal
          title={`${viewItem.item_id} — ${viewItem.item_name}`}
          onClose={() => setViewItem(null)}
          width="560px"
          headerActions={
            <Kebab items={[
              { label: 'Edit', action: () => { setViewItem(null); setEditItem(viewItem); } },
              { label: 'Delete', danger: true, action: () => del(viewItem) }
            ]} />
          }
        >
          <div className="view-grid">
            {[
              ['Item ID', viewItem.item_id],
              ['Category', catBadge(viewItem.category)],
              ['Variant', viewItem.variant || '—'],
              ['Vendor', viewItem.vendor || '—'],
              ['Order #', viewItem.order_number ? <span className="order-link" onClick={() => { setViewItem(null); onOpenOrder(viewItem.order_number); }}>{viewItem.order_number}</span> : '—'],
              ['Date', fmtDate(viewItem.date_purchased)],
              ['Condition', viewItem.condition || '—'],
              ['Qty Purchased', viewItem.qty_purchased],
              ['Unit Cost', fmt$(viewItem.unit_cost)],
              ['Shipping Alloc', fmt$(viewItem.shipping_allocated)],
              ['Tax Alloc', fmt$(viewItem.tax_allocated)],
              ['Line Total', fmt$(viewItem.total_line_cost)],
              ['Location', viewItem.location || '—'],
              ['Notes', viewItem.notes || '—'],
            ].map(([k, v]) => (
              <div key={k}><div className="vk">{k}</div><div className="vv">{v}</div></div>
            ))}
          </div>
        </Modal>
      )}

      {editItem && (
        <Modal title={`Edit ${editItem.item_id}`} onClose={() => setEditItem(null)} width="640px">
          <PurchasedItemForm initial={editItem} onSave={saveEdit} onClose={() => setEditItem(null)} categories={categories} />
        </Modal>
      )}
    </>
  );
}

// ── PurchasedItemForm ─────────────────────
function PurchasedItemForm({ initial = {}, onSave, onClose }) {
  const [f, setF] = useState({
	  item_name: '', variant: '', vendor: '', date_purchased: '',
	  qty_purchased: 1, unit_cost: '', condition: 'New',
	  category: '', location: '', notes: '', stock_item_id: '',
	  is_digital: false,
	  update_unit_cost: !initial.item_id,  // true for new, false for edit
	  ...initial
	});
  const [stockItems, setStockItems] = useState([]);
  const [showNewStock, setShowNewStock] = useState(false);
  const [newStock, setNewStock] = useState({ name: '', variant: '', category: '', sku_prefix: '', location: '', notes: '' });
  const [creatingStock, setCreatingStock] = useState(false);
  const [skuError, setSkuError] = useState('');

  useEffect(() => { api('/api/stock?active=all').then(setStockItems); }, []);

  useEffect(() => {
    setNewStock(p => ({
      ...p,
      name: f.item_name,
      category: f.category,
      sku_prefix: f.category ? f.category.slice(0, 2).toUpperCase() : ''
    }));
  }, [f.item_name, f.category]);

  const handle = e => setF(p => ({ ...p, [e.target.name]: e.target.value }));
  const handleNewStock = e => { setSkuError(''); setNewStock(p => ({ ...p, [e.target.name]: e.target.value })); };

  const toggleDigital = e => {
    const digital = e.target.checked;
    setF(p => ({ ...p, is_digital: digital, stock_item_id: digital ? '' : p.stock_item_id }));
    if (digital) setShowNewStock(false);
  };

  const createStockItem = async () => {
    if (!newStock.name) return;
    const prefix = (newStock.sku_prefix || '').toUpperCase();
    if (!prefix) { setSkuError('SKU prefix is required.'); return; }
    const taken = stockItems.some(s => s.sku && s.sku.startsWith(prefix + '-'));
    if (taken) { setSkuError(`Prefix "${prefix}" already in use. Choose a different one.`); return; }
    setCreatingStock(true);
    try {
      const created = await api('/api/stock', { method: 'POST', body: { ...newStock, sku_prefix: prefix } });
      const refreshed = await api('/api/stock');
      setStockItems(refreshed);
      setF(p => ({ ...p, stock_item_id: String(created.id), category: newStock.category }));
      setShowNewStock(false);
      setNewStock({ name: '', variant: '', category: '', sku_prefix: '', location: '', notes: '' });
    } catch (e) {
      setSkuError('Failed to create stock item: ' + e.message);
    }
    setCreatingStock(false);
  };

  return (
    <form onSubmit={e => { e.preventDefault(); onSave(f); }}>
      <div className="form-grid">
        <div className="form-group full"><label>Item Name *</label><input name="item_name" value={f.item_name} onChange={handle} required /></div>
        <div className="form-group"><label>Category *</label><CategoryCombobox value={f.category} onChange={handle} /></div>
        <div className="form-group"><label>Vendor</label><input name="vendor" value={f.vendor || ''} onChange={handle} /></div>
        <div className="form-group"><label>Date Purchased</label><input type="date" name="date_purchased" value={f.date_purchased ? fmtDate(f.date_purchased) : ''} onChange={handle} /></div>
        <div className="form-group"><label>Variant</label><input name="variant" value={f.variant || ''} onChange={handle} /></div>
        <div className="form-group"><label>Condition</label><select name="condition" value={f.condition} onChange={handle}>{CONDITIONS.map(c => <option key={c}>{c}</option>)}</select></div>
        <div className="form-group"><label>Qty Purchased</label><input type="number" name="qty_purchased" value={f.qty_purchased} onChange={handle} min="1" /></div>
        <div className="form-group"><label>Unit Cost</label><input type="number" name="unit_cost" value={f.unit_cost} onChange={handle} step="0.01" min="0" /></div>
        <div className="form-group full" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
		  <input type="checkbox" id="update_unit_cost"
			checked={!!f.update_unit_cost}
			onChange={e => setF(p => ({ ...p, update_unit_cost: e.target.checked }))}
			style={{ width: 'auto', margin: 0 }} />
		  <label htmlFor="update_unit_cost" style={{ margin: 0, cursor: 'pointer', fontSize: 13 }}>
			Update stock replacement cost from this purchase
		  </label>
		</div>
		<div className="form-group"><label>Location</label><input name="location" value={f.location || ''} onChange={handle} /></div>

        {/* Digital asset toggle */}
        <div className="form-group full" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <input type="checkbox" id="is_digital" checked={!!f.is_digital} onChange={toggleDigital} style={{ width: 'auto', margin: 0 }} />
          <label htmlFor="is_digital" style={{ margin: 0, cursor: 'pointer' }}>Digital asset</label>
        </div>

        {!f.is_digital && (
          <div className="form-group full">
            <label>Stock Item</label>
            <div style={{ display: 'flex', gap: 8 }}>
              <select name="stock_item_id" value={f.stock_item_id || ''} onChange={handle} style={{ flex: 1 }}>
                <option value="">— none —</option>
                {stockItems.map(s => (
                  <option key={s.id} value={s.id} style={!s.active ? { color: 'var(--muted)' } : {}}>
                    {s.sku} — {s.name}{s.variant ? ` (${s.variant})` : ''}{!s.active ? ' [Retired]' : ''}
                  </option>
                ))}
              </select>
              <button type="button" className="sm" onClick={() => setShowNewStock(p => !p)}>
                {showNewStock ? 'Cancel' : '+ New'}
              </button>
            </div>
          </div>
        )}

        <div className="form-group full"><label>Notes</label><textarea name="notes" value={f.notes || ''} onChange={handle} rows={2} /></div>
      </div>

      {!f.is_digital && showNewStock && (
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: 12, marginTop: 10 }}>
          <div style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '.05em' }}>New Stock Item</div>
          <div className="form-grid">
            <div className="form-group full"><label>Name *</label><input name="name" value={newStock.name} onChange={handleNewStock} required /></div>
            <div className="form-group"><label>Category</label><CategoryCombobox value={newStock.category} onChange={handleNewStock} /></div>
            <div className="form-group">
              <label>SKU Prefix *</label>
              <input name="sku_prefix" value={newStock.sku_prefix || ''} onChange={handleNewStock} placeholder="e.g. EL, PT" maxLength={4} style={{ textTransform: 'uppercase' }} />
              {skuError && <div style={{ color: 'var(--danger)', fontSize: 11, marginTop: 4 }}>{skuError}</div>}
            </div>
            <div className="form-group"><label>Variant</label><input name="variant" value={newStock.variant} onChange={handleNewStock} /></div>
            <div className="form-group"><label>Location</label><input name="location" value={newStock.location} onChange={handleNewStock} /></div>
            <div className="form-group full"><label>Notes</label><input name="notes" value={newStock.notes} onChange={handleNewStock} /></div>
          </div>
          <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
            <button type="button" className="primary sm" onClick={createStockItem} disabled={!newStock.name || creatingStock}>
              {creatingStock ? 'Creating…' : 'Create Stock Item'}
            </button>
          </div>
        </div>
      )}

      <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 20 }}>
        <button type="button" onClick={onClose}>Cancel</button>
        <button type="submit" className="primary">Save</button>
      </div>
    </form>
  );
}

// ── StockItemForm ───────────────────────────
function StockItemForm({ initial = {}, onSave, onClose, stockItems = [] }) {
  const [f, setF] = useState({
    name: '', variant: '', category: '', sku_prefix: '',
    location: '', notes: '', low_stock_threshold: '', ...initial
  });
  const [skuError, setSkuError] = useState('');

  const handle = e => {
    setSkuError('');
    setF(p => ({ ...p, [e.target.name]: e.target.value }));
  };

  useEffect(() => {
    if (f.name && !initial.id) {
      setF(p => ({ ...p, sku_prefix: f.name.slice(0, 2).toUpperCase() }));
    }
  }, [f.name]);

  const submit = e => {
    e.preventDefault();
    if (!initial.id) {
      const prefix = (f.sku_prefix || '').toUpperCase();
      if (!prefix) { setSkuError('SKU prefix is required.'); return; }
      const taken = stockItems.some(s => s.sku && s.sku.startsWith(prefix + '-'));
      if (taken) { setSkuError(`Prefix "${prefix}" is already in use. Choose a different one.`); return; }
    }
    onSave(f);
  };

	return (
	  <form onSubmit={submit}>
		<div className="form-grid">
		  <div className="form-group full"><label>Name *</label><input name="name" value={f.name} onChange={handle} required /></div>
		  <div className="form-group"><label>Category</label><CategoryCombobox value={f.category} onChange={handle} /></div>
		  <div className="form-group">
			<label>SKU Prefix {!initial.id && '*'}</label>
			<input name="sku_prefix" value={f.sku_prefix || ''} onChange={handle}
			  placeholder="e.g. EL, PT" maxLength={4}
			  style={{ textTransform: 'uppercase' }} disabled={!!initial.id} />
			{skuError && <div style={{ color: 'var(--danger)', fontSize: 11, marginTop: 4 }}>{skuError}</div>}
		  </div>

		  <div className="form-group"><label>Variant</label><input name="variant" value={f.variant || ''} onChange={handle} /></div>
		  <div className="form-group"><label>Location</label><input name="location" value={f.location || ''} onChange={handle} /></div>

		  {initial.id ? (
			<>
			  <div className="form-group">
				<label>Avg Cost</label>
				<input value={fmt$(initial.avg_cost)} disabled style={{ opacity: 0.6 }} />
			  </div>
			  <div className="form-group">
				<label>On Hand</label>
				<input value={initial.qty_on_hand ?? ''} disabled style={{ opacity: 0.6 }} />
			  </div>
			</>
		  ) : (
			<>
			  <div className="form-group">
				<label>Replacement Cost</label>
				<input type="number" name="unit_cost" value={f.unit_cost ?? ''} onChange={handle}
				  step="0.01" min="0" placeholder="Auto-updated on purchase" />
			  </div>
			  <div className="form-group"><label>Low Stock Threshold</label>
				<input type="number" name="low_stock_threshold" value={f.low_stock_threshold ?? ''}
				  onChange={handle} min="0" placeholder="Leave blank to disable" />
			  </div>
			</>
		  )}

		  {initial.id && (
			<>
			  <div className="form-group">
				<label>Replacement Cost</label>
				<input type="number" name="unit_cost" value={f.unit_cost ?? ''} onChange={handle}
				  step="0.01" min="0" placeholder="Auto-updated on purchase" />
			  </div>
			  <div className="form-group"><label>Low Stock Threshold</label>
				<input type="number" name="low_stock_threshold" value={f.low_stock_threshold ?? ''}
				  onChange={handle} min="0" placeholder="Leave blank to disable" />
			  </div>
			</>
		  )}

		  <div className="form-group full"><label>Notes</label><input name="notes" value={f.notes || ''} onChange={handle} /></div>
		</div>
		<div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 20 }}>
		  <button type="button" onClick={onClose}>Cancel</button>
		  <button type="submit" className="primary">Save</button>
		</div>
	  </form>
	);
}
// ── AdjustModal ───────────────────────────
function AdjustModal({ item, onClose, onSaved }) {
  const [qty, setQty] = useState('');
  const [reason, setReason] = useState('Found');
  const [notes, setNotes] = useState('');
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  const REASONS = ['Found', 'Lost', 'Damaged', 'Correction', 'Other'];

  const save = async e => {
    e.preventDefault();
    const qtyNum = parseInt(qty);
    if (!qtyNum || qtyNum === 0) { setErr('Qty change cannot be zero.'); return; }
    setSaving(true); setErr('');
    try {
      await api('/api/stock/adjust', { method: 'POST', body: {
        stock_item_id: item.id,
        qty_change: qtyNum,
        reason,
        notes: notes || null
      }});
      onSaved();
    } catch(e) { setErr(e.message); }
    setSaving(false);
  };

  return (
    <Modal title={`Adjust — ${item.sku}`} onClose={onClose} width="440px">
      <form onSubmit={save}>
        <div className="form-grid">
          <div className="form-group full">
            <label>Qty Change *</label>
            <input type="number" value={qty} onChange={e => setQty(e.target.value)}
              placeholder="e.g. 2 or -1" required />
            <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Use negative to decrease, positive to increase</div>
          </div>
          <div className="form-group full">
            <label>Reason *</label>
            <select value={reason} onChange={e => setReason(e.target.value)}>
              {REASONS.map(r => <option key={r}>{r}</option>)}
            </select>
          </div>
          <div className="form-group full">
            <label>Notes</label>
            <input value={notes} onChange={e => setNotes(e.target.value)} />
          </div>
        </div>
        {err && <div className="result-err" style={{marginTop:10}}>{err}</div>}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
          <button type="button" onClick={onClose}>Cancel</button>
          <button type="submit" className="primary" disabled={saving}>{saving?'Saving…':'Save Adjustment'}</button>
        </div>
      </form>
    </Modal>
  );
}

// ── StockItemViewModal ────────────────────
